<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zingoo Live</title>
    
    <!-- 1. Force HTTPS Auto-Redirect (Ignoring Localhost for development) -->
    <script>
        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            window.location.href = 'https://' + window.location.hostname + window.location.pathname + window.location.search;
        }
    </script>

    <!-- 2. Synchronous/Static CDN Script Loading (Zero Async-Loader to prevent 4G timeouts) -->
    <!-- ZEGOCLOUD SDKs -->
    <script src="https://cdn.jsdelivr.net/npm/zego-express-engine-webrtc@3.1.0/ZegoExpressWebRTC.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

    <!-- Tailwind CSS for smooth and scalable layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Mobile-First and Native App feel overrides */
        body {
            background-color: #0c080e;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for chat box */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Smooth transitions */
        .page-transition {
            transition: all 0.3s ease-in-out;
        }
        /* Video wrapper styling */
        #video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between">

    <!-- APP WRAPPER -->
    <div id="app" class="relative w-full h-full max-w-md mx-auto bg-neutral-950 flex flex-col shadow-2xl overflow-hidden">
        
        <!-- ==================== DASHBOARD VIEW ==================== -->
        <div id="dashboard-view" class="page-transition flex flex-col h-full w-full">
            <!-- Header -->
            <header class="p-4 bg-neutral-900 border-b border-neutral-800 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-black tracking-wider text-pink-500">ZINGOO</span>
                    <span class="bg-red-500 text-[10px] uppercase font-bold px-2 py-0.5 rounded-full text-white animate-pulse">Live</span>
                </div>
                <!-- Profile Area -->
                <div class="flex items-center gap-2 bg-neutral-800/80 px-3 py-1.5 rounded-full border border-neutral-700">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=zingoo" alt="User Avatar" class="w-6 h-6 rounded-full border border-pink-500">
                    <div class="flex flex-col text-left">
                        <span id="user-display-name" class="text-xs font-bold truncate max-w-[80px]">Guest</span>
                        <span class="text-[10px] text-yellow-400 font-semibold flex items-center gap-1">
                            <i class="fa-solid fa-gem"></i> <span id="user-diamonds">0</span>
                        </span>
                    </div>
                </div>
            </header>

            <!-- Main Content Area / Streams Grid -->
            <main class="flex-1 overflow-y-auto p-4 pb-24 no-scrollbar">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Trending Streams</h2>
                
                <!-- Dynamic Grid container -->
                <div id="streams-grid" class="grid grid-cols-2 gap-3">
                    <!-- Loading state placeholder -->
                    <div id="streams-placeholder" class="col-span-2 text-center py-12 text-gray-500">
                        <i class="fa-solid fa-circle-notch animate-spin text-3xl text-pink-500 mb-2"></i>
                        <p class="text-sm">Finding active streams...</p>
                    </div>
                </div>
            </main>

            <!-- Bottom Create Stream Button -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-10">
                <button id="btn-trigger-go-live" class="bg-gradient-to-r from-pink-500 to-red-500 hover:from-pink-600 hover:to-red-600 text-white font-extrabold px-8 py-3.5 rounded-full shadow-lg shadow-pink-500/30 flex items-center gap-2 transform active:scale-95 transition-transform">
                    <i class="fa-solid fa-video"></i> GO LIVE
                </button>
            </div>
        </div>

        <!-- ==================== LIVE STREAM SCREEN ==================== -->
        <div id="live-room-view" class="page-transition hidden absolute inset-0 z-20 bg-black flex flex-col justify-between">
            <!-- Video Box -->
            <div id="video-container" class="absolute inset-0 w-full h-full bg-neutral-900 z-0 flex items-center justify-center">
                <!-- Single flexible video element. Host plays local camera stream, viewer plays remote stream -->
                <video id="live-video" autoplay playsinline class="w-full h-full object-cover"></video>
                <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 text-white gap-3 z-10 hidden">
                    <i class="fa-solid fa-spinner animate-spin text-4xl text-pink-500"></i>
                    <p class="text-sm text-gray-300">Connecting video stream...</p>
                </div>
            </div>

            <!-- Overlaid Room UI (Headers, Live Info) -->
            <div class="relative z-10 flex flex-col justify-between h-full p-4 pointer-events-none">
                <!-- Top Panel -->
                <div class="flex justify-between items-center pointer-events-auto">
                    <!-- Host Badge -->
                    <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md border border-white/10 p-1.5 pr-4 rounded-full">
                        <img id="room-host-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=host" class="w-8 h-8 rounded-full border border-pink-500" alt="Host">
                        <div class="flex flex-col text-left">
                            <span id="room-host-name" class="text-xs font-bold text-white max-w-[80px] truncate">HostName</span>
                            <span id="room-viewer-count" class="text-[9px] text-gray-300 flex items-center gap-1">
                                <i class="fa-solid fa-eye text-pink-500"></i> 1 Viewer
                            </span>
                        </div>
                    </div>

                    <!-- Actions Panel -->
                    <div class="flex items-center gap-2">
                        <button id="btn-leave-room" class="bg-red-500/80 hover:bg-red-600 text-white p-2.5 rounded-full border border-white/10 active:scale-95 transition-transform flex items-center justify-center w-10 h-10">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>
                </div>

                <!-- Middle Stream Banner Title -->
                <div class="absolute top-20 left-4 right-4 pointer-events-none">
                    <div class="bg-black/45 backdrop-blur-sm p-2 rounded-lg border border-white/5 inline-block text-left max-w-xs">
                        <span class="text-[10px] text-pink-400 uppercase font-bold tracking-wider block">Topic</span>
                        <h3 id="room-stream-title" class="text-xs font-semibold text-white truncate">Chilling with guys!</h3>
                    </div>
                </div>

                <!-- Bottom Panel (Chat & Controls) -->
                <div class="flex flex-col gap-3 pointer-events-auto w-full mt-auto">
                    <!-- Live Chat Messages Scroll Box -->
                    <div id="chat-box" class="h-44 overflow-y-auto flex flex-col gap-1.5 p-2 rounded-xl no-scrollbar bg-gradient-to-t from-black/60 to-transparent">
                        <!-- Chat nodes dynamically loaded -->
                    </div>

                    <!-- Interactive Controls (Input & Gifting) -->
                    <div class="flex items-center gap-2 w-full">
                        <div class="flex-1 flex bg-black/50 backdrop-blur-md border border-white/10 rounded-full px-3 py-1.5 items-center">
                            <input id="chat-input" type="text" placeholder="Send a message..." class="bg-transparent border-none outline-none flex-1 text-sm text-white placeholder-gray-400">
                            <button id="btn-send-chat" class="text-pink-500 p-1.5 active:scale-90 transition-transform">
                                <i class="fa-solid fa-paper-plane text-base"></i>
                            </button>
                        </div>
                        
                        <!-- Gift button (Diamond transfer helper) -->
                        <button id="btn-send-gift" class="bg-gradient-to-r from-yellow-400 to-amber-500 text-neutral-950 p-3 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform font-bold w-12 h-12">
                            <i class="fa-solid fa-gem text-lg animate-bounce"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== GO LIVE MODAL ==================== -->
        <div id="modal-go-live" class="hidden fixed inset-0 z-30 bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
            <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 w-full max-w-xs text-center flex flex-col gap-4">
                <div class="w-16 h-16 bg-pink-500/10 border border-pink-500/20 text-pink-500 rounded-full flex items-center justify-center mx-auto text-2xl">
                    <i class="fa-solid fa-video"></i>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-white">Create Broadcast</h3>
                    <p class="text-xs text-gray-400 mt-1">Set a catchy title for your trending stream</p>
                </div>
                <input id="live-title-input" type="text" placeholder="e.g. Daily chit-chat 🚀" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm outline-none text-white focus:border-pink-500">
                
                <div class="flex gap-2">
                    <button id="btn-cancel-live" class="flex-1 bg-neutral-800 hover:bg-neutral-700 text-gray-300 font-bold py-2.5 rounded-xl text-sm transition-colors">
                        Cancel
                    </button>
                    <button id="btn-start-live" class="flex-1 bg-gradient-to-r from-pink-500 to-red-500 text-white font-bold py-2.5 rounded-xl text-sm transition-colors">
                        Go Live Now
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- ==================== FIREBASE & ZEGO IMPLEMENTATION MODULE ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, off, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration (Direct Inject)
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ZEGOCLOUD Technical Specifications
        const AppID = 557776684;
        const ServerSecret = "d595b7c54719d1f52d8b1e8f0bb446c6";
        const ServerURL = "wss://webliveroom557776684-api.coolzcloud.com/ws";

        // Core App State Tracking
        let currentUser = null;
        let zg = null;
        let currentRoomId = null;
        let currentRole = null; // 'host' or 'viewer'
        let localStream = null;
        let remoteStream = null;
        let chatListenerRef = null;
        let viewersListenerRef = null;

        // UI References
        const userAvatar = document.getElementById('user-avatar');
        const userDisplayName = document.getElementById('user-display-name');
        const userDiamondsVal = document.getElementById('user-diamonds');
        const streamsGrid = document.getElementById('streams-grid');
        const streamsPlaceholder = document.getElementById('streams-placeholder');
        
        const dashboardView = document.getElementById('dashboard-view');
        const liveRoomView = document.getElementById('live-room-view');
        
        const btnTriggerGoLive = document.getElementById('btn-trigger-go-live');
        const modalGoLive = document.getElementById('modal-go-live');
        const liveTitleInput = document.getElementById('live-title-input');
        const btnCancelLive = document.getElementById('btn-cancel-live');
        const btnStartLive = document.getElementById('btn-start-live');

        const btnLeaveRoom = document.getElementById('btn-leave-room');
        const roomHostAvatar = document.getElementById('room-host-avatar');
        const roomHostName = document.getElementById('room-host-name');
        const roomViewerCount = document.getElementById('room-viewer-count');
        const roomStreamTitle = document.getElementById('room-stream-title');
        
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('btn-send-chat');
        const btnSendGift = document.getElementById('btn-send-gift');
        const liveVideo = document.getElementById('live-video');
        const videoPlaceholder = document.getElementById('video-placeholder');

        // Initialize WebRTC Guard and ZegoExpressEngine
        function initZego() {
            try {
                if (typeof window.ZegoExpressEngine === 'undefined') {
                    throw new Error("ZEGOCLOUD WebRTC Bundle could not be loaded statically.");
                }
                zg = new window.ZegoExpressEngine(AppID, ServerURL);
                console.log("ZEGOCLOUD Express Engine successfully initialized.");
            } catch (err) {
                console.error("Zego Initialization Failed:", err);
                alert("Technical Alert: WebRTC hardware devices initialization failed. Web browsers enforce secure contexts (HTTPS or localhost). If using normal IP access, internal device drivers will crash.\nDetails: " + err.message);
            }
        }

        // Firebase User Setup & Auto-Login Loop
        async function setupUserAuth() {
            let userId = localStorage.getItem('zingoo_id');
            let isNewUser = false;

            if (!userId) {
                // Generate secure random ID sequence matching Database schema design
                userId = "177952" + Math.floor(100000 + Math.random() * 900000);
                const generatedName = "LiveUser_" + Math.floor(1000 + Math.random() * 9000);
                const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${generatedName}`;
                
                currentUser = {
                    id: userId,
                    name: generatedName,
                    phone: "0000000000",
                    gender: "all",
                    state: "Global",
                    avatar: avatarUrl,
                    diamonds: 100,
                    status: "online",
                    golden: false,
                    timestamp: Date.now()
                };

                await set(ref(db, `users/${userId}`), currentUser);
                localStorage.setItem('zingoo_id', userId);
                isNewUser = true;
            }

            if (!isNewUser) {
                // Fetch existing profile records
                const snapshot = await get(ref(db, `users/${userId}`));
                if (snapshot.exists()) {
                    currentUser = snapshot.val();
                } else {
                    // Profile cleared from RTDB node - force regeneration
                    localStorage.removeItem('zingoo_id');
                    return setupUserAuth();
                }
            }

            // Sync User Interface
            userAvatar.src = currentUser.avatar;
            userDisplayName.textContent = currentUser.name;
            userDiamondsVal.textContent = currentUser.diamonds;

            // Live-sync active state changes (like diamond deduction/addition)
            onValue(ref(db, `users/${currentUser.id}/diamonds`), (snap) => {
                if (snap.exists()) {
                    currentUser.diamonds = snap.val();
                    userDiamondsVal.textContent = currentUser.diamonds;
                }
            });
        }

        // Real-time grid syncing for dashboard listing
        function syncActiveStreams() {
            const streamsRef = ref(db, 'live_streams');
            onValue(streamsRef, (snapshot) => {
                streamsGrid.innerHTML = '';
                
                if (!snapshot.exists()) {
                    streamsPlaceholder.classList.remove('hidden');
                    streamsGrid.appendChild(streamsPlaceholder);
                    return;
                }

                streamsPlaceholder.classList.add('hidden');
                const data = snapshot.val();

                Object.keys(data).forEach(roomId => {
                    const stream = data[roomId];
                    if (!stream.isLive) return;

                    const viewersCount = stream.viewers ? Object.keys(stream.viewers).length : 0;
                    
                    const card = document.createElement('div');
                    card.className = "bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden relative cursor-pointer active:scale-[0.98] transition-transform";
                    card.innerHTML = `
                        <!-- Cover placeholder (Host Avatar Backdrop) -->
                        <div class="h-32 bg-gradient-to-br from-pink-900/40 to-neutral-800 relative flex items-center justify-center">
                            <img src="${stream.hostAvatar}" alt="${stream.hostName}" class="w-14 h-14 rounded-full border-2 border-pink-500 shadow-lg">
                            <span class="absolute top-2 left-2 bg-pink-500 text-white font-bold text-[8px] px-2 py-0.5 rounded flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-white animate-ping"></span> LIVE
                            </span>
                            <span class="absolute top-2 right-2 bg-black/50 text-white font-bold text-[8px] px-2 py-0.5 rounded-full flex items-center gap-1">
                                <i class="fa-solid fa-eye text-pink-500"></i> ${viewersCount}
                            </span>
                        </div>
                        <div class="p-3 flex flex-col gap-1 text-left">
                            <span class="text-xs font-bold text-white truncate">${stream.title}</span>
                            <span class="text-[10px] text-gray-400 truncate">@${stream.hostName}</span>
                        </div>
                    `;

                    card.addEventListener('click', () => {
                        joinLiveRoom(roomId, stream);
                    });

                    streamsGrid.appendChild(card);
                });
            });
        }

        // Switch application viewport states
        function switchView(viewName) {
            if (viewName === 'dashboard') {
                liveRoomView.classList.add('hidden');
                dashboardView.classList.remove('hidden');
            } else if (viewName === 'room') {
                dashboardView.classList.add('hidden');
                liveRoomView.classList.remove('hidden');
            }
        }

        // ==================== STREAM CHAT LOGIC ====================
        function appendChatMessage(user, text, type = 'user') {
            const wrapper = document.createElement('div');
            wrapper.className = "text-xs text-left max-w-full flex items-start gap-1 p-1 rounded";
            
            if (type === 'system') {
                wrapper.innerHTML = `<span class="text-pink-400 font-bold italic">${user} ${text}</span>`;
            } else if (type === 'gift') {
                wrapper.innerHTML = `
                    <span class="bg-amber-500/10 border border-amber-500/20 text-yellow-400 px-2 py-1 rounded-lg font-bold flex items-center gap-1 animate-pulse">
                        <i class="fa-solid fa-gift"></i> ${user} sent a Diamond! 💎
                    </span>
                `;
            } else {
                wrapper.innerHTML = `
                    <span class="text-pink-400 font-bold shrink-0">${user}:</span>
                    <span class="text-gray-200 break-all">${text}</span>
                `;
            }

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Monitor Real-Time Room Events
        function setupRoomListeners(roomId) {
            // Listen to Live Chat & Gifts
            const chatRef = ref(db, `live_streams/${roomId}/chats`);
            chatListenerRef = onValue(chatRef, (snapshot) => {
                chatBox.innerHTML = ''; // Keep dynamic reset clean
                if (snapshot.exists()) {
                    const chats = snapshot.val();
                    Object.keys(chats).forEach(key => {
                        const chat = chats[key];
                        if (chat.isGift) {
                            appendChatMessage(chat.user, 'Gift', 'gift');
                        } else if (chat.system) {
                            appendChatMessage(chat.user, chat.text, 'system');
                        } else {
                            appendChatMessage(chat.user, chat.text, 'user');
                        }
                    });
                }
            });

            // Listen to Dynamic Viewers Count Updates
            const viewersRef = ref(db, `live_streams/${roomId}/viewers`);
            viewersListenerRef = onValue(viewersRef, (snapshot) => {
                if (snapshot.exists()) {
                    const count = Object.keys(snapshot.val()).length;
                    roomViewerCount.innerHTML = `<i class="fa-solid fa-eye text-pink-500"></i> ${count} Viewer${count > 1 ? 's' : ''}`;
                } else {
                    roomViewerCount.innerHTML = `<i class="fa-solid fa-eye text-pink-500"></i> 0 Viewers`;
                }
            });
        }

        // Tear down room listener structures
        function detachRoomListeners(roomId) {
            if (chatListenerRef) off(ref(db, `live_streams/${roomId}/chats`));
            if (viewersListenerRef) off(ref(db, `live_streams/${roomId}/viewers`));
        }

        // ==================== ZEGOCLOUD MEDIA PIPELINE FLOWS ====================

        // [HOST FLOW]
        async function hostLiveRoom(title) {
            if (!zg) {
                alert("Zego Express SDK has failed to initialize. Operation canceled.");
                return;
            }

            currentRole = 'host';
            currentRoomId = "room_" + currentUser.id;

            // Sync Stream Headers
            roomHostAvatar.src = currentUser.avatar;
            roomHostName.textContent = currentUser.name;
            roomStreamTitle.textContent = title;
            chatBox.innerHTML = '';
            videoPlaceholder.classList.remove('hidden');

            switchView('room');

            try {
                // Create stream node in RTDB first
                const streamRef = ref(db, `live_streams/${currentRoomId}`);
                await set(streamRef, {
                    hostName: currentUser.name,
                    hostAvatar: currentUser.avatar,
                    title: title,
                    isLive: true,
                    timestamp: Date.now()
                });

                // Force dynamic node removal upon connection failure or page unload
                onDisconnect(streamRef).remove();

                // Setup system alerts inside Firebase
                const systemChatRef = push(ref(db, `live_streams/${currentRoomId}/chats`));
                await set(systemChatRef, {
                    user: currentUser.name,
                    text: "started live stream",
                    system: true
                });

                // Generate kit test token dynamically utilizing Prebuilt SDK fallback mechanism
                const token = window.ZegoUIKitPrebuilt.generateKitTokenForTest(
                    AppID,
                    ServerSecret,
                    currentRoomId,
                    currentUser.id,
                    currentUser.name
                );

                // Log into ZEGOCLOUD WebRTC Space
                await zg.loginRoom(currentRoomId, token, { userID: currentUser.id, userName: currentUser.name }, { userUpdate: true });
                
                // Initialize internal camera and microphone assets
                localStream = await zg.createStream({
                    camera: {
                        video: true,
                        audio: true
                    }
                });

                videoPlaceholder.classList.add('hidden');
                
                // Attach captured stream logic into raw HTML Video node
                liveVideo.srcObject = localStream;
                liveVideo.muted = true; // Avoid feedback lookback from native microphone

                // Begin publishing live visual track to other connected viewers
                zg.startPublishingStream(currentRoomId, localStream);

                setupRoomListeners(currentRoomId);

            } catch (err) {
                console.error("Host setup crashed:", err);
                alert("Could not start broadcast: " + err.message);
                leaveLiveRoom();
            }
        }

        // [VIEWER FLOW]
        async function joinLiveRoom(roomId, stream) {
            if (!zg) {
                alert("Zego Engine offline. Playback disabled.");
                return;
            }

            currentRole = 'viewer';
            currentRoomId = roomId;

            roomHostAvatar.src = stream.hostAvatar;
            roomHostName.textContent = stream.hostName;
            roomStreamTitle.textContent = stream.title;
            chatBox.innerHTML = '';
            videoPlaceholder.classList.remove('hidden');

            switchView('room');

            try {
                const token = window.ZegoUIKitPrebuilt.generateKitTokenForTest(
                    AppID,
                    ServerSecret,
                    roomId,
                    currentUser.id,
                    currentUser.name
                );

                // Setup Real-time dynamic listeners
                setupRoomListeners(roomId);

                // Register Viewer presence dynamic status
                const viewerRecordRef = ref(db, `live_streams/${roomId}/viewers/${currentUser.id}`);
                await set(viewerRecordRef, true);
                onDisconnect(viewerRecordRef).remove();

                // Broadcast join system notice
                const systemJoinRef = push(ref(db, `live_streams/${roomId}/chats`));
                set(systemJoinRef, {
                    user: currentUser.name,
                    text: "joined active stream",
                    system: true
                });

                // Join ZEGOCLOUD room Space
                await zg.loginRoom(roomId, token, { userID: currentUser.id, userName: currentUser.name }, { userUpdate: true });

                // Catch additions inside dynamic media list tracks
                zg.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                    if (updateType === 'ADD' && streamList.length > 0) {
                        const streamID = streamList[0].streamID;
                        try {
                            remoteStream = await zg.startPlayingStream(streamID);
                            videoPlaceholder.classList.add('hidden');
                            liveVideo.srcObject = remoteStream;
                            liveVideo.muted = false; // Viewers must hear the broadcast audio
                        } catch (mediaErr) {
                            console.error("Playback play process error:", mediaErr);
                        }
                    } else if (updateType === 'DELETE') {
                        alert("The host has ended this live session.");
                        leaveLiveRoom();
                    }
                });

            } catch (err) {
                console.error("Viewer join flow crashed:", err);
                alert("Could not join live room: " + err.message);
                leaveLiveRoom();
            }
        }

        // [CLEAN EXIT SYSTEM]
        async function leaveLiveRoom() {
            if (!currentRoomId) return;

            // Turn off loaders
            videoPlaceholder.classList.add('hidden');

            try {
                if (currentRole === 'host') {
                    // Destroy stream dynamic parameters from global db mapping
                    const streamRef = ref(db, `live_streams/${currentRoomId}`);
                    await remove(streamRef);

                    // Stop Zego stream tracks publishing
                    if (localStream) {
                        zg.stopPublishingStream(currentRoomId);
                        zg.destroyStream(localStream);
                        localStream = null;
                    }
                } else if (currentRole === 'viewer') {
                    // Stop stream rendering engines
                    if (remoteStream) {
                        zg.stopPlayingStream(currentRoomId);
                        remoteStream = null;
                    }
                    // Remove current active user reference as viewer
                    const viewerRecordRef = ref(db, `live_streams/${currentRoomId}/viewers/${currentUser.id}`);
                    await remove(viewerRecordRef);
                }

                // Disengage Room environment completely
                zg.logoutRoom(currentRoomId);
                detachRoomListeners(currentRoomId);

            } catch (err) {
                console.error("Room exit process encountered clean errors:", err);
            } finally {
                // Clear UI references
                liveVideo.srcObject = null;
                currentRoomId = null;
                currentRole = null;
                switchView('dashboard');
            }
        }

        // ==================== INTERACTION ACTION HANDLERS ====================

        // Trigger Live Settings Modal opening
        btnTriggerGoLive.addEventListener('click', () => {
            modalGoLive.classList.remove('hidden');
            liveTitleInput.value = '';
        });

        btnCancelLive.addEventListener('click', () => {
            modalGoLive.classList.add('hidden');
        });

        // Initialize user-created custom Live Stream session
        btnStartLive.addEventListener('click', () => {
            const title = liveTitleInput.value.trim() || `${currentUser.name}'s Live Room`;
            modalGoLive.classList.add('hidden');
            hostLiveRoom(title);
        });

        // Exit Broadcast Area
        btnLeaveRoom.addEventListener('click', () => {
            if (confirm("Are you sure you want to leave this session?")) {
                leaveLiveRoom();
            }
        });

        // Chat Submission trigger handler
        async function handleSendChat() {
            const text = chatInput.value.trim();
            if (!text || !currentRoomId) return;

            try {
                const msgRef = push(ref(db, `live_streams/${currentRoomId}/chats`));
                await set(msgRef, {
                    user: currentUser.name,
                    text: text,
                    isGift: false
                });
                chatInput.value = '';
            } catch (err) {
                console.error("Text delivery transaction failed:", err);
            }
        }

        btnSendChat.addEventListener('click', handleSendChat);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSendChat();
        });

        // Dynamic Virtual Gift (Diamonds) Mechanism
        btnSendGift.addEventListener('click', async () => {
            if (!currentRoomId) return;

            if (currentRole === 'host') {
                alert("Hosts cannot send gifts to their own broadcast.");
                return;
            }

            // Real-time balance and safe transaction verification checks
            if (currentUser.diamonds < 10) {
                alert("Insufficient Diamonds! You need at least 10 diamonds to send a gift.");
                return;
            }

            try {
                const newDiamondsVal = currentUser.diamonds - 10;
                
                // Perform dynamic balances deduction
                await update(ref(db, `users/${currentUser.id}`), {
                    diamonds: newDiamondsVal
                });

                // Post live animation/visual signal inside Chat interface
                const giftRef = push(ref(db, `live_streams/${currentRoomId}/chats`));
                await set(giftRef, {
                    user: currentUser.name,
                    text: "Gift",
                    isGift: true
                });

            } catch (err) {
                console.error("Gifting database transaction crash:", err);
            }
        });

        // Initialization Pipeline
        window.addEventListener('DOMContentLoaded', async () => {
            initZego();
            await setupUserAuth();
            syncActiveStreams();
        });
    </script>
</body>
</html>
