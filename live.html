            } catch (e) {
                currentUser = "User";
                currentUserId = "1779524470438";
            }
            
            const loginScreen = document.getElementById('id-login-screen');
            const mainApp = document.getElementById('main-app');
            if (loginScreen) loginScreen.style.display = 'none';
            if (mainApp) mainApp.style.display = 'block';
            
            showToast("Session recovered successfully!");
            fetchLiveStreams();
        }

        // --- FETCH STREAMS ---
        function fetchLiveStreams() {
            onValue(ref(db, 'live_streams'), (snapshot) => {
                const grid = document.getElementById('liveGrid'); 
                if (!grid) return;
                grid.innerHTML = '';
                const streams = snapshot.val();
                let count = 0;
                
                if (streams) {
                    Object.entries(streams).forEach(([streamId, data]) => {
                        if (data.isLive) {
                            count++;
                            const viewerCount = data.viewers ? Object.keys(data.viewers).length : 0;
                            const card = document.createElement('div');
                            card.className = 'live-card';
                            card.onclick = () => joinLiveStream(streamId, data);
                            card.innerHTML = `
                                <img src="${data.hostAvatar}" alt="Live">
                                <div class="card-top-info">
                                    <span class="live-badge">LIVE</span>
                                    <span class="viewers"><i class="fas fa-eye"></i> ${viewerCount}</span>
                                </div>
                                <div class="card-bottom-info">
                                    <div class="user-name">${data.hostName}</div>
                                    <div class="live-title">${data.title}</div>
                                </div>
                            `;
                            grid.appendChild(card);
                        }
                    });
                }
                if(count === 0) grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">No active streams.</p>';
            });
        }

        window.openStartLiveModal = () => document.getElementById('startLiveModal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        // --- HOST: GO LIVE (ZEGOCLOUD WITH AUTO-TOKEN ENGINE) ---
        document.getElementById('btn-confirm-go-live').addEventListener('click', async () => {
            const title = document.getElementById('stream-title').value.trim() || `${currentUser}'s Live`;
            closeModal('startLiveModal'); showLoading("Starting Engine...");

            const newStreamRef = push(ref(db, 'live_streams'));
            currentStreamId = newStreamRef.key;
            isHost = true;

            try {
                // AUTO TOKEN GENERATOR (Using window fallback to prevent reference errors)
                const zegoPrebuilt = window.ZegoUIKitPrebuilt || ZegoUIKitPrebuilt;
                const autoToken = zegoPrebuilt.generateKitTokenForTest(ZEGO_APP_ID, ZEGO_SERVER_SECRET, currentStreamId, currentUserId, currentUser);

                // 1. Login to Zego Room using Auto-Token
                await zg.loginRoom(currentStreamId, autoToken, { userID: currentUserId, userName: currentUser }, { userUpdate: true });
                
                // 2. Create local camera stream
                localStream = await zg.createStream({ camera: { video: true, audio: true } });
                
                // 3. Play local stream on screen
                const localVideoWrapper = document.getElementById('local-video-wrapper');
                localVideoWrapper.style.display = 'block';
                document.getElementById('remote-video-wrapper').style.display = 'none';
                localStream.playVideo(localVideoWrapper, { objectFit: "cover" });

                // 4. Publish stream to server
                zg.startPublishingStream(currentStreamId, localStream);

                // 5. Update Firebase
                await set(newStreamRef, { hostName: currentUser, hostAvatar: currentAvatar, title: title, isLive: true, timestamp: serverTimestamp() });
                onDisconnect(newStreamRef).remove();
                
                setupLiveUI(currentUser, currentAvatar);
                hideLoading(); showToast("You are LIVE! 🔴");

            } catch (err) {
                hideLoading(); alert("Camera Error: " + err.message);
            }
        });

        // --- VIEWER: JOIN LIVE (ZEGOCLOUD WITH AUTO-TOKEN ENGINE) ---
        async function joinLiveStream(streamId, streamData) {
            showLoading("Joining Live...");
            currentStreamId = streamId; isHost = false;

            try {
                // AUTO TOKEN GENERATOR (Using window fallback to prevent reference errors)
                const zegoPrebuilt = window.ZegoUIKitPrebuilt || ZegoUIKitPrebuilt;
                const autoToken = zegoPrebuilt.generateKitTokenForTest(ZEGO_APP_ID, ZEGO_SERVER_SECRET, currentStreamId, currentUserId, currentUser);

                // 1. Login to Zego Room using Auto-Token
                await zg.loginRoom(currentStreamId, autoToken, { userID: currentUserId, userName: currentUser }, { userUpdate: true });
                
                // 2. Listen for Stream Updates
                zg.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                    if (updateType === 'ADD') {
                        remoteStream = await zg.startPlayingStream(streamList[0].streamID);
                        const remoteVideoWrapper = document.getElementById('remote-video-wrapper');
                        document.getElementById('local-video-wrapper').style.display = 'none';
                        remoteVideoWrapper.style.display = 'block';
                        
                        remoteStream.playVideo(remoteVideoWrapper, { objectFit: "cover" });
                    }
                });

                // Update Firebase Viewer Count
                await set(ref(db, `live_streams/${streamId}/viewers/${currentUser}`), true);
                onDisconnect(ref(db, `live_streams/${streamId}/viewers/${currentUser}`)).remove();

                setupLiveUI(streamData.hostName, streamData.hostAvatar);
                hideLoading(); showToast("Joined Live Stream!");
                push(ref(db, `live_streams/${streamId}/chats`), { user: 'System', text: `${currentUser} joined!` });

            } catch(e) {
                hideLoading(); showToast("Error joining stream.");
            }
        }

        function setupLiveUI(hName, hAvatar) {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('live-view-screen').style.display = 'flex';
            document.getElementById('live-host-name').innerText = hName;
            document.getElementById('live-host-avatar').src = hAvatar;
            
            onValue(ref(db, `live_streams/${currentStreamId}/viewers`), (snap) => {
                const countEl = document.getElementById('live-viewer-count');
                if (countEl) countEl.innerText = snap.val() ? Object.keys(snap.val()).length : 0;
            });
            setupChat();
        }

        // --- LEAVE LIVE ---
        window.leaveLiveStream = function() {
            document.getElementById('live-view-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';

            if (isHost && currentStreamId) {
                zg.stopPublishingStream(currentStreamId);
                zg.destroyStream(localStream);
                remove(ref(db, `live_streams/${currentStreamId}`));
            } else if (!isHost && currentStreamId) {
                zg.stopPlayingStream(currentStreamId);
                remove(ref(db, `live_streams/${currentStreamId}/viewers/${currentUser}`));
                push(ref(db, `live_streams/${currentStreamId}/chats`), { user: 'System', text: `${currentUser} left.` });
            }

            zg.logoutRoom(currentStreamId);
            currentStreamId = null;
        }

        document.getElementById('btn-leave-live').addEventListener('click', leaveLiveStream);

        // --- LIVE CHAT ---
        function setupChat() {
            const chatBox = document.getElementById('live-chat-box'); 
            if (!chatBox) return;
            chatBox.innerHTML = ''; 
            onChildAdded(ref(db, `live_streams/${currentStreamId}/chats`), (snap) => {
                const data = snap.val();
                if(data) {
                    const msgDiv = document.createElement('div');
                    if (data.user === 'System') { msgDiv.className = 'chat-msg system'; msgDiv.innerHTML = `${data.text}`; } 
                    else if (data.isGift) { msgDiv.className = 'chat-msg gift'; msgDiv.innerHTML = `<span>${data.user}:</span> Sent a Gift! 💎`; } 
                    else { msgDiv.className = 'chat-msg'; msgDiv.innerHTML = `<span>${data.user}:</span> ${data.text}`; }
                    
                    chatBox.appendChild(msgDiv);
                    if (chatBox.children.length > 50) chatBox.removeChild(chatBox.firstChild);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        document.getElementById('live-chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() && currentStreamId) {
                push(ref(db, `live_streams/${currentStreamId}/chats`), { user: currentUser, text: this.value.trim() });
                this.value = '';
            }
        });

        // --- GIFTS ---
        window.handleGiftClick = function() {
            if (isHost) { showToast("You cannot gift yourself!"); return; }
            if (userDiamonds >= 10) {
                userDiamonds -= 10; showToast("Gift Sent! 💎");
                push(ref(db, `live_streams/${currentStreamId}/chats`), { user: currentUser, isGift: true, text: "Gift" });
            } else { alert("Not enough diamonds!"); }
        };

        window.redirectToDiamondStore = function() {
            window.location.href = 'home.html?action=buy_diamonds';
        };

    </script>
</body>
</html>
