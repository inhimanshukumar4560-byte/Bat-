<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zingoo Live</title>
    
    <!-- 1. Force HTTPS Auto-Redirect (Bypasses Local IP/Localhost) -->
    <script>
        const isIPAddress = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/.test(window.location.hostname);
        if (window.location.protocol !== 'https:' && 
            window.location.hostname !== 'localhost' && 
            window.location.hostname !== '127.0.0.1' &&
            !isIPAddress) {
            window.location.href = 'https://' + window.location.hostname + window.location.pathname + window.location.search;
        }
    </script>

    <!-- 2. Bulletproof Zego UIKit Prebuilt SDK (Verified working on your network) -->
    <script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js" 
            onerror="this.onerror=null; this.src='https://cdn.jsdelivr.net/npm/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js';"></script>

    <!-- Tailwind CSS & Icon pack -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #root {
            width: 100vw;
            height: 100vh;
        }
        /* Custom floating classes */
        .toast-animation {
            animation: slideInUp 0.4s ease-out forwards, fadeOut 0.4s ease-in 2.5s forwards;
        }
        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body class="relative">

    <!-- ZEGO VIDEO STREAM CONTAINER -->
    <div id="root"></div>

    <!-- ==================== CUSTOM ZINGOO OVERLAY LAYER ==================== -->
    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-4">
        
        <!-- Top Overlay Bar (Branding & User Info) -->
        <div class="flex justify-between items-start w-full pointer-events-auto">
            <!-- Zingoo Branding -->
            <div class="flex items-center gap-1.5 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
                <span class="text-sm font-black tracking-wider text-pink-500">ZINGOO</span>
                <span class="bg-red-500 text-[8px] uppercase font-bold px-1.5 py-0.5 rounded-full text-white animate-pulse">Live</span>
            </div>

            <!-- Profile & Real-time Diamonds Panel -->
            <div id="user-profile-panel" class="hidden flex items-center gap-2 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
                <img id="user-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=zingoo" alt="User Avatar" class="w-6 h-6 rounded-full border border-pink-500">
                <div class="flex flex-col text-left">
                    <span id="user-display-name" class="text-[10px] font-bold text-white truncate max-w-[80px]">Guest</span>
                    <span class="text-[10px] text-yellow-400 font-semibold flex items-center gap-1">
                        <i class="fa-solid fa-gem"></i> <span id="user-diamonds">0</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Middle Gifting Alert Popups (Toasts will inject here dynamically) -->
        <div id="gifting-toast-container" class="absolute top-1/4 left-4 right-4 flex flex-col gap-2 pointer-events-none">
            <!-- Floating alerts show up here -->
        </div>

        <!-- Bottom Action Controls (Gift Trigger Panel) -->
        <div class="flex justify-end items-center w-full mt-auto">
            <!-- Floating Send Gift Button (Viewer-Only, visible when role is Audience) -->
            <button id="btn-floating-gift" class="hidden pointer-events-auto bg-gradient-to-r from-yellow-400 to-amber-500 text-neutral-950 p-3.5 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform font-bold w-12 h-12">
                <i class="fa-solid fa-gem text-lg animate-bounce"></i>
            </button>
        </div>

    </div>

    <!-- ==================== FIREBASE & HYBRID ZEGO LOGIC ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, off, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Zego Kit Configurations
        const appID = 557776684;
        const serverSecret = "d595b7c54719d1f52d8b1e8f0bb446c6";

        let currentUser = null;

        // URL Parameters Parser
        function getUrlParams(url) {
            let urlStr = url.split('?')[1];
            if (!urlStr) return {};
            const urlSearchParams = new URLSearchParams(urlStr);
            return Object.fromEntries(urlSearchParams.entries());
        }

        // Firebase User Authentication Loop
        async function setupUserAuth() {
            let userId = localStorage.getItem('zingoo_id');
            let isNewUser = false;

            if (!userId) {
                userId = "177952" + Math.floor(100000 + Math.random() * 900000);
                const generatedName = "LiveUser_" + Math.floor(1000 + Math.random() * 9000);
                const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${generatedName}`;
                
                currentUser = {
                    id: userId,
                    name: generatedName,
                    phone: "0000000000",
                    gender: "all",
                    state: "Global",
                    avatar: avatarUrl,
                    diamonds: 100,
                    status: "online",
                    golden: false,
                    timestamp: Date.now()
                };

                await set(ref(db, `users/${userId}`), currentUser);
                localStorage.setItem('zingoo_id', userId);
                isNewUser = true;
            }

            if (!isNewUser) {
                const snapshot = await get(ref(db, `users/${userId}`));
                if (snapshot.exists()) {
                    currentUser = snapshot.val();
                } else {
                    localStorage.removeItem('zingoo_id');
                    return setupUserAuth();
                }
            }

            // Sync User interface
            document.getElementById('user-avatar').src = currentUser.avatar;
            document.getElementById('user-display-name').textContent = currentUser.name;
            document.getElementById('user-diamonds').textContent = currentUser.diamonds;
            document.getElementById('user-profile-panel').classList.remove('hidden');

            // Listen to dynamic diamond balance updates
            onValue(ref(db, `users/${currentUser.id}/diamonds`), (snap) => {
                if (snap.exists()) {
                    currentUser.diamonds = snap.val();
                    document.getElementById('user-diamonds').textContent = currentUser.diamonds;
                }
            });
        }

        // Display beautiful Gifting Toast alerts on screen
        function triggerGiftNotification(senderName) {
            const container = document.getElementById('gifting-toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-gradient-to-r from-amber-500/90 to-yellow-500/90 border border-amber-400 text-neutral-950 font-black px-4 py-2.5 rounded-full text-xs shadow-lg flex items-center justify-between mx-auto max-w-xs toast-animation pointer-events-auto";
            toast.innerHTML = `
                <span>🎉 <strong class="underline">${senderName}</strong> sent a Diamond Gift! </span>
                <i class="fa-solid fa-gem text-base text-neutral-950 animate-bounce ml-2"></i>
            `;
            container.appendChild(toast);
            
            // Auto clean-up
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Initialize App & Join Zego Room
        window.addEventListener('DOMContentLoaded', async () => {
            await setupUserAuth();

            // Parse Stream Parameters
            const params = getUrlParams(window.location.href);
            const roomID = params['roomID'] || (Math.floor(Math.random() * 10000) + "");
            let roleParam = params['role'] || 'Host';
            const isHost = roleParam.toLowerCase() === 'host';
            const role = isHost ? ZegoUIKitPrebuilt.Host : ZegoUIKitPrebuilt.Audience;

            // Generate Kit Token using Zego SDK
            const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(
                appID,
                serverSecret,
                roomID,
                currentUser.id,
                currentUser.name
            );

            // Zego UI Prebuilt Configurations
            let config = {};
            if (isHost) {
                config = {
                    turnOnCameraWhenJoining: true,
                    showMyCameraToggleButton: true,
                    showAudioVideoSettingsButton: true,
                    showScreenSharingButton: true,
                    showTextChat: true,
                    showUserList: true,
                };
            } else {
                // Show floating Gift button to viewers only
                document.getElementById('btn-floating-gift').classList.remove('hidden');
                config = {
                    turnOnCameraWhenJoining: false,
                    showTextChat: true,
                    showUserList: true,
                };
            }

            const zp = ZegoUIKitPrebuilt.create(kitToken);
            zp.joinRoom({
                container: document.querySelector("#root"),
                scenario: {
                    mode: ZegoUIKitPrebuilt.LiveStreaming,
                    config: { role },
                },
                sharedLinks: [{
                    name: 'Join as an audience',
                    url: window.location.protocol + '//' + window.location.host + window.location.pathname + '?roomID=' + roomID + '&role=Audience',
                }],
                ...config
            });

            // ==================== REAL-TIME GIFTING WORKFLOW ====================
            
            // Listen to real-time gifts node in Firebase
            const giftingRef = ref(db, `live_streams/${roomID}/gifting`);
            onValue(giftingRef, (snapshot) => {
                if (snapshot.exists()) {
                    const gifts = snapshot.val();
                    const latestGiftKey = Object.keys(gifts).pop();
                    const latestGift = gifts[latestGiftKey];
                    
                    // Don't repeat notifications older than 5 seconds (to avoid spam on page load)
                    if (Date.now() - latestGift.timestamp < 5000) {
                        triggerGiftNotification(latestGift.senderName);
                    }
                }
            });

            // Gift button click handler
            document.getElementById('btn-floating-gift').addEventListener('click', async () => {
                if (currentUser.diamonds < 10) {
                    alert("Insufficient Diamonds! You need at least 10 diamonds to send a gift.");
                    return;
                }

                try {
                    // 1. Deduct 10 diamonds from sender profile
                    const newBalance = currentUser.diamonds - 10;
                    await update(ref(db, `users/${currentUser.id}`), {
                        diamonds: newBalance
                    });

                    // 2. Push gifting record into Firebase stream node
                    const newGiftRef = push(ref(db, `live_streams/${roomID}/gifting`));
                    await set(newGiftRef, {
                        senderName: currentUser.name,
                        timestamp: Date.now()
                    });

                } catch (err) {
                    console.error("Gifting transaction error:", err);
                }
            });

        });
    </script>
</body>
</html>
