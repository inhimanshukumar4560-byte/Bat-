<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Audio Room</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        :root {
            --theme-color: #ff8a65;
            --text-light: #ffffff;
            --text-dim: #b3a0cc;
            --seat-bg: rgba(255, 255, 255, 0.9);
            --panel-bg: #ffffff;
        }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* App Container */
        .app-container { width: 100%; max-width: 450px; height: 100%; background: #fff; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Main Audio Room View */
        #room-view {
            width: 100%;
            height: 100%;
            background: url('https://i.ibb.co/8nLL3qwv/file-00000000484c71f8880494edee7225e8.png') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        #room-background-overlay { position: absolute; inset: 0; z-index: 1; transition: background-image 0.5s; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; z-index: 10; }
        .host-info { display: flex; align-items: center; background: rgba(0, 0, 0, 0.4); border-radius: 30px; padding: 5px 15px 5px 5px; max-width: 60%; }
        .host-avatar { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; border: 2px solid #ffd700; overflow: hidden; }
        .host-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .host-details { display: flex; flex-direction: column; overflow: hidden; }
        .host-name { color: var(--text-light); font-size: 12px; font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .viewers { color: var(--text-dim); font-size: 10px; }
        .header-actions { display: flex; gap: 15px; align-items: center; color: var(--text-light); font-size: 20px; }
        .leave-btn { background: rgba(255,0,0,0.5); font-size: 12px; padding: 5px 10px; border-radius: 10px; cursor: pointer; }

        /* YouTube Player */
        #youtubePlayerContainer { width: 90%; margin: 10px auto; border-radius: 10px; overflow: hidden; z-index: 15; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: height 0.3s; }
        #youtubePlayer { width: 100%; height: 100%; }

        /* Seats */
        .seats-container { padding: 20px 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px 5px; z-index: 10; }
        .seat { display: flex; flex-direction: column; align-items: center; position: relative; }
        .seat-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--seat-bg); display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 5px; border: 2px solid transparent; overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .seat.empty .seat-avatar { background: white; color: #9c27b0; font-size: 20px; border: 2px solid #9c27b0; }
        .seat-name { color: var(--text-light); font-size: 11px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; max-width: 60px; }
        .seat-frame { position: absolute; inset: -4px; z-index: 5; pointer-events: none; }
        .seat-chair-bg { position: absolute; inset: 0; z-index: -1; background-size: cover; background-position: center; border-radius: 50%; }

        /* Chat */
        .chat-container { flex: 1; padding: 10px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; z-index: 10; margin-bottom: 120px; }
        .sys-message { color: #ffffff; font-size: 13px; background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 10px; align-self: flex-start; max-width: 90%; }
        .user-message { display: flex; align-items: flex-start; gap: 8px; max-width: 85%; align-self: flex-start; }
        .msg-avatar { width: 25px; height: 25px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        .msg-content { background: rgba(0, 0, 0, 0.5); padding: 8px 12px; border-radius: 12px; }
        .msg-name { color: #ffeb3b; font-size: 11px; font-weight: bold; }
        .msg-text { color: white; font-size: 13px; }

        /* Bottom UI */
        .bottom-ui-wrapper { position: absolute; bottom: 0; width: 100%; padding: 10px 15px 15px; z-index: 20; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .lower-bottom-row { display: flex; justify-content: space-between; align-items: center; }
        .chat-pill-btn { background: #ff8a65; color: white; border: none; padding: 10px 25px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .action-circles { display: flex; gap: 12px; }
        .circle-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .menu-circle { background: #ab47bc; }
        .gift-circle { background: #26a69a; }

        /* Chat Input Overlay */
        .chat-input-overlay { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(to top, rgba(26, 15, 46, 1) 50%, rgba(26, 15, 46, 0.8)); display: none; z-index: 40; }
        .chat-input-overlay.active { display: block; }
        .chat-input-box { display: flex; align-items: center; border: 1px solid #ff8a65; border-radius: 30px; padding: 5px 15px; }
        .chat-input-box input { flex: 1; background: transparent; border: none; color: white; font-size: 14px; outline: none; padding: 10px 0; }
        .chat-send-icon { color: #ffffff; font-size: 20px; cursor: pointer; background: transparent; border: none; }

        /* Panels & Modals */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 35; display: none; }
        .overlay.active { display: block; }
        .dropdown-menu { position: absolute; bottom: 80px; right: 15px; background: white; border-radius: 10px; width: 220px; z-index: 100; display: none; flex-direction: column; overflow: hidden; }
        .dropdown-menu.active { display: flex; }
        .menu-item { padding: 15px; color: #333; font-size: 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; cursor: pointer; }
        
        /* YouTube Modal */
        #youtubeModal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 110; display: none; justify-content: center; align-items: center; }
        .yt-box { background: white; padding: 20px; border-radius: 15px; width: 90%; display: flex; flex-direction: column; gap: 10px;}
        .yt-box h3 { font-size: 18px; text-align: center; }
        .yt-box input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; }
        .yt-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .yt-btns button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; }
        .yt-play-video { background: #4caf50; color: white; }
        .yt-play-audio { background: #2196f3; color: white; }
        .yt-stop { background: #f44336; color: white; margin-top: 5px; }
        .yt-cancel { background: #eee; color: #333; }
        
        /* Gift/Store Panel */
        #gift-panel { position: absolute; bottom: -100%; left: 0; width: 100%; height: 60%; background: #1f1430; z-index: 120; border-top-left-radius: 20px; border-top-right-radius: 20px; transition: bottom 0.3s ease-in-out; display: flex; flex-direction: column; }
        #gift-panel.active { bottom: 0; }
        .gift-panel-header { padding: 15px; text-align: center; color: white; font-weight: bold; border-bottom: 1px solid #443a59; display: flex; justify-content: space-around; }
        .gift-panel-header .tab { cursor: pointer; padding: 5px 10px; border-radius: 5px; }
        .gift-panel-header .tab.active { background: #ff8a65; }
        .gift-panel-body { flex: 1; overflow-y: auto; padding: 15px; }
        .gift-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; }
        .gift-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; }
        .gift-item img { width: 40px; height: 40px; object-fit: contain; margin: 0 auto 5px; }
        .gift-item .name { font-size: 11px; color: white; }
        .gift-item .price { font-size: 10px; color: #ffeb3b; font-weight: bold; }

    </style>
</head>
<body>

    <div class="app-container">
        <div id="room-view">
            <div id="room-background-overlay"></div>
            
            <header>
                <div class="host-info">
                    <div class="host-avatar" id="rv_hostImage"></div>
                    <div class="host-details">
                        <span class="host-name" id="rv_roomName">Loading...</span>
                        <span class="viewers">👥 <span id="rv_viewerCount">0</span></span>
                    </div>
                </div>
                <div class="header-actions">
                    <span class="leave-btn" id="leaveRoomBtn">Leave</span>
                </div>
            </header>

            <!-- YouTube Player Container -->
            <div id="youtubePlayerContainer">
                <div id="youtubePlayer"></div>
            </div>

            <div class="seats-container" id="seatsContainer"></div>
            <div class="chat-container" id="chatBox"></div>

            <div class="bottom-ui-wrapper" id="mainBottomUI">
                <div class="lower-bottom-row">
                    <button class="chat-pill-btn" id="openChatBtn">💬 Chat</button>
                    <div class="action-circles">
                        <button class="circle-btn menu-circle" id="menuBtn">⋮</button>
                        <button class="circle-btn gift-circle" id="openGiftBtn">🎁</button>
                    </div>
                </div>
            </div>

            <!-- MENU, CHAT & OVERLAYS -->
            <div class="dropdown-menu" id="topMenu"></div>
            <div class="chat-input-overlay" id="chatInputArea">
                <div class="chat-input-box">
                    <input type="text" id="messageInput" placeholder="Add comment...">
                    <button class="chat-send-icon" id="sendBtn">➤</button>
                </div>
            </div>
            <div class="overlay" id="overlay"></div>

            <!-- YOUTUBE MODAL -->
            <div id="youtubeModal">
                <div class="yt-box">
                    <h3>Play YouTube Media</h3>
                    <input type="text" id="ytUrlInput" placeholder="https://youtube.com/watch?v=...">
                    <div class="yt-btns">
                        <button class="yt-play-video" id="ytPlayVideoBtn">Play Video</button>
                        <button class="yt-play-audio" id="ytPlayAudioBtn">Play Audio</button>
                    </div>
                    <button class="yt-stop" id="ytStopBtn">Stop Media</button>
                    <button class="yt-cancel" id="ytCancelBtn">Cancel</button>
                </div>
            </div>
            
            <!-- GIFT/STORE PANEL -->
            <div id="gift-panel">
                <div class="gift-panel-header">
                    <div class="tab active" data-tab="gifts">Gifts</div>
                    <div class="tab" data-tab="chairs">Chairs</div>
                    <div class="tab" data-tab="frames">Frames</div>
                    <div class="tab" data-tab="backgrounds">Backgrounds</div>
                </div>
                <div class="gift-panel-body">
                    <div class="gift-grid" id="gift-grid-gifts"></div>
                    <div class="gift-grid" id="gift-grid-chairs" style="display:none;"></div>
                    <div class="gift-grid" id="gift-grid-frames" style="display:none;"></div>
                    <div class="gift-grid" id="gift-grid-backgrounds" style="display:none;"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. FIREBASE & INITIAL SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // User and Room State
        const myUserId = localStorage.getItem('zingoo_user'); // zingoo_user is the name/ID
        const myUserName = localStorage.getItem('zingoo_user');
        let currentRoomId = null;
        let roomHostId = null;
        let roomListenerRef = null;
        let youtubePlayer = null;

        // DOM Elements
        const rvRoomName = document.getElementById('rv_roomName');
        const rvHostImage = document.getElementById('rv_hostImage');
        const seatsContainer = document.getElementById('seatsContainer');
        const overlay = document.getElementById('overlay');
        const ytModal = document.getElementById('youtubeModal');
        const ytContainer = document.getElementById('youtubePlayerContainer');
        
        // --- 2. ROOM INITIALIZATION & UI RENDERING ---
        function initializeRoomView() {
            const params = new URLSearchParams(window.location.search);
            currentRoomId = params.get('roomId');

            if (!currentRoomId || !myUserId) {
                alert("Error: Room ID or User ID not found. Redirecting to home.");
                window.location.href = 'index.html'; // Adjust to your main dashboard file
                return;
            }

            // Start listening to room data
            roomListenerRef = db.ref(`rooms/${currentRoomId}`);
            roomListenerRef.on('value', (snapshot) => {
                if (!snapshot.exists()) {
                    alert("This room has been closed by the host.");
                    window.location.href = 'index.html';
                    return;
                }
                const roomData = snapshot.val();
                renderRoom(roomData);
            });
            loadStoreItems();
        }

        function renderRoom(roomData) {
            roomHostId = roomData.hostId;
            rvRoomName.innerText = roomData.roomName;
            rvHostImage.innerHTML = `<img src="${roomData.thumbnail}" alt="Host">`;
            
            renderMenu();
            renderSeats(roomData);
            handleYoutubeState(roomData.youtube);

            // Set room background if one is active
            if (roomData.activeBackground) {
                document.getElementById('room-background-overlay').style.backgroundImage = `url(${roomData.activeBackground})`;
            } else {
                document.getElementById('room-background-overlay').style.backgroundImage = 'none';
            }
        }
        
        function renderMenu() {
            let menuHtml = '';
            if (myUserId === roomHostId) {
                menuHtml += `<div class="menu-item" id="menuPlayYt">Play YouTube <span>▶️</span></div>`;
            }
            menuHtml += `<div class="menu-item">Room Settings <span>⚙️</span></div>`;
            document.getElementById('topMenu').innerHTML = menuHtml;

            if (myUserId === roomHostId) {
                document.getElementById('menuPlayYt').addEventListener('click', () => {
                    document.getElementById('topMenu').classList.remove('active');
                    ytModal.style.display = 'flex';
                });
            }
        }
        
        function renderSeats(roomData) {
            seatsContainer.innerHTML = '';
            for (let i = 0; i < roomData.maxSeats; i++) {
                const seatHTML = i === 0 
                    ? `<div class="seat occupied">
                           <div class="seat-avatar" style="border-color: #ffd700;"><img src="${roomData.thumbnail}"></div>
                           <span class="seat-name">${roomData.hostName}</span>
                       </div>`
                    : `<div class="seat empty"><div class="seat-avatar">🔒</div><span class="seat-name">..</span></div>`;
                seatsContainer.innerHTML += seatHTML;
            }
        }

        // --- 3. YOUTUBE PLAYER LOGIC (VIDEO & AUDIO) ---
        window.onYouTubeIframeAPIReady = function() {
            // This function is called by the YouTube API script when it's ready.
        }

        function handleYoutubeState(ytData) {
            if (ytData && ytData.videoId) {
                ytContainer.style.display = 'block';
                const isAudioOnly = ytData.mode === 'audio';
                ytContainer.style.height = isAudioOnly ? '0px' : '200px';

                if (!youtubePlayer) {
                    youtubePlayer = new YT.Player('youtubePlayer', {
                        height: isAudioOnly ? '0' : '200',
                        width: '100%',
                        videoId: ytData.videoId,
                        playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1 },
                        events: { 'onReady': onPlayerReady }
                    });
                } else {
                    youtubePlayer.loadVideoById(ytData.videoId);
                    youtubePlayer.getIframe().style.height = isAudioOnly ? '0px' : '200px';
                }
            } else {
                ytContainer.style.display = 'none';
                if (youtubePlayer) {
                    youtubePlayer.stopVideo();
                }
            }
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        function extractVideoID(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }

        function playYoutube(mode) {
            const url = document.getElementById('ytUrlInput').value;
            const videoId = extractVideoID(url);
            if (videoId && currentRoomId) {
                db.ref(`rooms/${currentRoomId}/youtube`).set({ videoId, mode });
                ytModal.style.display = 'none';
                document.getElementById('ytUrlInput').value = '';
            } else {
                alert("Invalid YouTube URL");
            }
        }

        document.getElementById('ytPlayVideoBtn').addEventListener('click', () => playYoutube('video'));
        document.getElementById('ytPlayAudioBtn').addEventListener('click', () => playYoutube('audio'));
        document.getElementById('ytStopBtn').addEventListener('click', () => {
            db.ref(`rooms/${currentRoomId}/youtube`).set(null);
            ytModal.style.display = 'none';
        });
        document.getElementById('ytCancelBtn').addEventListener('click', () => ytModal.style.display = 'none');


        // --- 4. GIFT & STORE LOGIC ---
        const giftPanel = document.getElementById('gift-panel');
        
        function loadStoreItems() {
            const itemTypes = ['gifts', 'chairs', 'frames', 'backgrounds'];
            itemTypes.forEach(type => {
                db.ref(`store_items/${type}`).on('value', (snapshot) => {
                    const container = document.getElementById(`gift-grid-${type}`);
                    container.innerHTML = '';
                    if (snapshot.exists()) {
                        snapshot.forEach(childSnapshot => {
                            const item = childSnapshot.val();
                            const itemId = childSnapshot.key;
                            container.innerHTML += `
                                <div class="gift-item" onclick="buyItem('${type}', '${itemId}', ${item.cost})">
                                    <img src="${item.imageUrl}" alt="${item.name}">
                                    <div class="name">${item.name}</div>
                                    <div class="price">💎 ${item.cost}</div>
                                </div>
                            `;
                        });
                    }
                });
            });
        }
        
        window.buyItem = async function(type, itemId, cost) {
            if (!confirm(`Buy this item for ${cost} diamonds?`)) return;

            const userDiamondsRef = db.ref(`users/${myUserId}/diamonds`);
            const snapshot = await userDiamondsRef.once('value');
            let currentDiamonds = snapshot.val() || 0;

            if (currentDiamonds < cost) {
                alert("You don't have enough diamonds! Redirecting to buy more.");
                // Redirecting to payment page with username and a sample amount
                window.location.href = `zingoo-pay.html?from=zingoo&username=${myUserId}&amount=100&diamonds=300`;
                return;
            }

            // Deduct diamonds and grant item
            await userDiamondsRef.set(currentDiamonds - cost);
            
            if (type === 'backgrounds') {
                // Special case: Set the background for the whole room
                const itemSnapshot = await db.ref(`store_items/backgrounds/${itemId}`).once('value');
                const itemUrl = itemSnapshot.val().imageUrl;
                db.ref(`rooms/${currentRoomId}/activeBackground`).set(itemUrl);
                alert('Room background changed!');
            } else {
                // For other items, add to user's inventory
                db.ref(`users/${myUserId}/inventory/${type}/${itemId}`).set(true);
                alert('Item purchased successfully!');
            }
        }

        // Gift Panel UI Toggles
        document.getElementById('openGiftBtn').addEventListener('click', () => {
            giftPanel.classList.add('active');
            overlay.classList.add('active');
        });
        
        document.querySelectorAll('.gift-panel-header .tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.gift-panel-header .tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.gift-panel-body .gift-grid').forEach(grid => grid.style.display = 'none');
                document.getElementById(`gift-grid-${tabName}`).style.display = 'grid';
            });
        });


        // --- 5. GENERAL UI & EVENT LISTENERS ---
        document.getElementById('leaveRoomBtn').addEventListener('click', async () => {
            if (myUserId === roomHostId) {
                if (confirm("You are the host. Leaving will close the room. Continue?")) {
                    await db.ref(`rooms/${currentRoomId}`).remove();
                }
            } else {
                // For regular users, we just redirect them
                window.location.href = 'index.html'; 
            }
        });
        
        // Menu and Chat UI interactions
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('topMenu').classList.toggle('active');
            overlay.classList.toggle('active');
        });

        document.getElementById('openChatBtn').addEventListener('click', () => { 
            document.getElementById('mainBottomUI').style.display = 'none'; 
            document.getElementById('chatInputArea').classList.add('active'); 
            overlay.classList.add('active'); 
            document.getElementById('messageInput').focus(); 
        });

        overlay.addEventListener('click', () => {
            document.getElementById('chatInputArea').classList.remove('active');
            document.getElementById('topMenu').classList.remove('active');
            giftPanel.classList.remove('active');
            overlay.classList.remove('active');
            document.getElementById('mainBottomUI').style.display = 'block';
        });

        // --- 6. RUN ON PAGE LOAD ---
        window.onload = initializeRoomView;

    </script>
</body>
</html>
