<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zingoo - Live Audio Room</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'zingoo-red': '#ff004c',
                        'zingoo-pink': '#ff3b6b',
                        'gold-light': '#FFE49E',
                        'gold-main': '#FBB03B',
                        'gold-dark': '#C47A11',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Syne', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hidden Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Golden Hearts Luxury Background Styling matching Image 1 */
        .golden-room-bg {
            background: radial-gradient(circle at 50% 30%, #FFEFC2 0%, #FFD64B 60%, #D89812 100%);
            position: relative;
            overflow: hidden;
        }

        /* Ambient glowing background elements representing luxury bows & golden bokeh */
        .golden-room-bg::before {
            content: '';
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.45) 0%, rgba(255, 214, 75, 0) 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Heart Floating Animation */
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-15px) scale(1.1) rotate(10deg); opacity: 1; }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.8; }
        }
        .animate-heart-float {
            animation: floatHeart 4s ease-in-out infinite;
        }

        /* Speaking Mic Glow */
        .speaking-glow {
            box-shadow: 0 0 20px #ff004c, 0 0 40px rgba(255, 0, 76, 0.5);
            border-color: #ff004c !important;
        }

        /* Transparent Custom Glass Panels for Chat */
        .chat-pill {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body class="golden-room-bg text-gray-900 min-h-screen flex flex-col justify-between overflow-hidden no-scrollbar antialiased">

    <!-- Floating Background Hearts -->
    <div class="absolute inset-0 pointer-events-none z-0">
        <!-- Golden Bow/Ribbon watermark simulation -->
        <div class="absolute top-[35%] right-[-5%] w-60 h-60 opacity-20 bg-cover bg-center" style="background-image: url('https://i.ibb.co/6HvwbJ0/default-avatar.png'); filter: grayscale(1) brightness(2);"></div>
        
        <div class="absolute top-[12%] left-[10%] text-5xl opacity-40 animate-heart-float">💛</div>
        <div class="absolute top-[28%] right-[15%] text-6xl opacity-35 animate-heart-float" style="animation-delay: 1.5s;">💛</div>
        <div class="absolute bottom-[35%] left-[8%] text-4xl opacity-50 animate-heart-float" style="animation-delay: 2.5s;">💛</div>
        <div class="absolute bottom-[22%] right-[22%] text-5xl opacity-40 animate-heart-float" style="animation-delay: 0.5s;">💛</div>
        
        <!-- Big text background overlay matching Image 1 -->
        <div class="absolute top-[35%] left-1/2 -translate-x-1/2 w-full text-center text-yellow-600/10 font-display text-[90px] tracking-widest pointer-events-none select-none font-black uppercase">ZINGOO</div>
    </div>

    <!-- 1. ROOM HEADER BAR -->
    <header class="relative z-20 px-4 pt-8 pb-3 flex justify-between items-center w-full">
        <!-- Room Identity Capsule (Image 1 style) -->
        <div class="flex items-center gap-2 bg-black/45 backdrop-blur-md rounded-full pl-1.5 pr-4 py-1 border border-white/10 shadow-lg">
            <img id="room-header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=zingoo&backgroundColor=f8f9fa" class="w-8 h-8 rounded-full object-cover">
            <div class="flex flex-col">
                <span class="text-white text-xs font-black leading-tight" id="room-header-title">Room</span>
                <span class="text-white/80 text-[10px] font-bold flex items-center gap-0.5 mt-0.5">
                    <span class="material-symbols-outlined text-[12px]">group</span>
                    <span id="room-online-count">0</span>
                </span>
            </div>
        </div>

        <!-- Premium Leave Button -->
        <button onclick="leaveRoomProcess()" class="bg-[#ff3b30] hover:bg-red-700 text-white font-extrabold px-6 py-2 rounded-full text-sm shadow-[0_4px_15px_rgba(255,59,48,0.3)] hover:scale-105 active:scale-95 transition-all">
            Leave
        </button>
    </header>

    <!-- 2. SEATS GRID (2 Rows of 5 Seats = 10 Seats matching Image 1) -->
    <main class="relative z-10 w-full px-4 my-auto">
        <div class="grid grid-cols-5 gap-y-8 gap-x-2.5 max-w-lg mx-auto justify-items-center" id="audio-seats-container">
            <!-- Dynamically injected with beautiful styling -->
        </div>
    </main>

    <!-- 3. NOTIFICATION & CHAT CONSOLE (Bottom-Left overlay) -->
    <div class="relative z-20 px-4 w-full max-w-sm flex flex-col gap-1.5 pointer-events-none mb-4 max-h-[160px] overflow-y-auto no-scrollbar" id="audio-chat-console">
        <!-- Messages bubble list matching Image 1 style -->
    </div>

    <!-- 4. FLOATING WALLET & LIMITED OFFERS -->
    <div class="relative z-20 px-4 w-full flex justify-between items-end mb-4">
        <!-- Buy More Pill -->
        <div onclick="openDiamondStoreRedirect()" class="bg-white/95 backdrop-blur border border-white/30 rounded-full px-4 py-2 flex items-center gap-2 shadow-lg cursor-pointer hover:scale-105 active:scale-95 transition-all pointer-events-auto">
            <span class="material-symbols-outlined text-[#ffbf00] text-[18px]">diamond</span>
            <span id="user-display-diamonds" class="text-gray-900 font-extrabold text-xs">0</span>
            <span class="text-purple-600 text-[10px] font-extrabold uppercase tracking-wider border-l border-gray-200 pl-2">Buy More</span>
        </div>

        <!-- Limited Offers floating card -->
        <div class="bg-gradient-to-br from-[#8E2DE2] to-[#4A00E0] rounded-[20px] p-4 w-36 shadow-[0_10px_25px_rgba(74,0,224,0.4)] border border-white/10 text-white flex flex-col items-center hover:scale-105 transition-all pointer-events-auto">
            <p class="text-[9px] text-white/80 font-black uppercase tracking-wider mb-1">Limited Offers</p>
            <div class="flex items-center gap-1 mb-1">
                <span class="material-symbols-outlined text-[#ffd700] text-[16px]">diamond</span>
                <span class="text-xl font-black">300</span>
            </div>
            <p class="text-[10px] text-white/50 line-through mb-2.5">₹100</p>
            <button onclick="triggerDirectPayment(100, 300)" class="w-full bg-[#9b51e0] hover:bg-white hover:text-[#4A00E0] text-white font-extrabold py-1.5 rounded-full text-[10px] transition shadow-md uppercase tracking-wider">Buy Now</button>
        </div>
    </div>

    <!-- 5. BOTTOM NAVIGATION BAR (Chat, Menu, Gift, Mic controls) -->
    <footer class="relative z-20 px-4 pb-8 flex justify-between items-center gap-3 w-full pointer-events-auto">
        <!-- Chat trigger pill -->
        <button onclick="toggleChatConsoleInput()" class="bg-[#ff5e62] text-white font-extrabold px-6 py-4 rounded-full text-sm flex items-center gap-2 shadow-lg hover:opacity-95 active:scale-95 transition-all flex-1 max-w-[140px]">
            <span class="material-symbols-outlined text-[18px]">chat</span> Chat
        </button>

        <!-- Menu Action -->
        <button onclick="openRoomOptionMenu()" class="w-12 h-12 rounded-full bg-[#8e2de2] text-white flex items-center justify-center shadow-lg hover:opacity-95 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-[24px]">more_vert</span>
        </button>

        <!-- Gifts Trigger -->
        <button onclick="openZingooGiftsSheet()" class="w-12 h-12 rounded-full bg-[#00c9ff] text-white flex items-center justify-center shadow-lg hover:opacity-95 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-[24px]">redeem</span>
        </button>

        <!-- Mic Control -->
        <button id="room-mic-btn" onclick="toggleSeatMicHardware()" class="w-12 h-12 rounded-full bg-[#1e293b] text-white flex items-center justify-center shadow-lg hover:opacity-95 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-[24px]" id="mic-status-icon">mic_off</span>
        </button>
    </footer>

    <!-- ================= MODALS & SLIDE-SHEETS ================= -->

    <!-- Dynamic Gift Bottom Sheet -->
    <div id="gift-bottom-sheet" class="fixed inset-0 bg-black/60 z-[999] hidden flex-col justify-end transition-all duration-300">
        <div class="absolute inset-0" onclick="closeZingooGiftsSheet()"></div>
        <div class="bg-white rounded-t-[30px] p-6 w-full max-h-[75vh] flex flex-col relative z-10 animate-fade-up">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
            
            <!-- Modal Tabs (Gifts / Store Assets) -->
            <div class="flex gap-4 border-b border-gray-100 pb-3 mb-4">
                <button onclick="switchGiftSheetTab('gifts')" id="tab-btn-gifts" class="text-sm font-black text-dia-red border-b-2 border-[#ff004c] pb-1.5 transition-all">🎁 Gifts</button>
                <button onclick="switchGiftSheetTab('assets')" id="tab-btn-assets" class="text-sm font-bold text-gray-400 pb-1.5 transition-all">💎 Store Assets</button>
            </div>

            <!-- Scrollable List Container -->
            <div class="flex-1 overflow-y-auto no-scrollbar max-h-[45vh]" id="gift-grid-viewport">
                <!-- Grid of dynamic items populated via Firebase -->
            </div>
        </div>
    </div>

    <!-- Simple Chat Message Input Modal -->
    <div id="chat-composer-modal" class="fixed inset-0 bg-black/60 z-[999] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm flex flex-col gap-4 animate-fade-up">
            <h3 class="text-gray-900 font-extrabold text-base">Send Room Message</h3>
            <input type="text" id="chat-input-composer" placeholder="Type a lovely message..." class="w-full bg-gray-100 border-none rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-red-500">
            <div class="flex gap-2 justify-end">
                <button onclick="toggleChatConsoleInput()" class="bg-gray-100 text-gray-500 font-bold px-4 py-2 rounded-xl text-xs">Cancel</button>
                <button onclick="sendChatMessage()" class="bg-[#ff004c] text-white font-black px-6 py-2 rounded-xl text-xs">Send</button>
            </div>
        </div>
    </div>

    <!-- Audio Streams Container (Strictly invisible) -->
    <div id="remote-audio-hub" class="hidden"></div>

    <!-- ================= FIREBASE V10 + WEBRTC MESH ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, push, get, update, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // WebRTC Config
        const rtcConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:global.stun.twilio.com:3478" }
            ]
        };

        // GLOBAL STATES
        let currentUser = localStorage.getItem("zingoo_user") || null;
        let currentAvatar = localStorage.getItem("zingoo_avatar") || "https://api.dicebear.com/7.x/avataaars/svg?seed=zingoo&backgroundColor=f8f9fa";
        let currentUserId = localStorage.getItem("zingoo_id") || null;
        let activeRoomId = localStorage.getItem("current_audio_room_id") || "default_audio_room";

        let localAudioStream = null;
        let activePeerConnections = {}; // targetUserId -> RTCPeerConnection
        let candidateQueues = {}; // targetUserId -> [candidate]
        let currentSeatIndex = null;
        
        // Listeners
        let refSeats = null;
        let refSignals = null;
        let refChat = null;

        // Auto initialization
        window.onload = async () => {
            if (!currentUser || !currentUserId) {
                // Return fallback to prevent crash, but user clicked from home, so it will exist
                alert("Please log in on Zingoo Home first to access this Audio Room.");
                window.location.href = "index.html";
                return;
            }

            // Sync user diamonds in real-time
            onValue(ref(db, `users/${currentUser}/diamonds`), (snap) => {
                if (snap.exists()) {
                    const diamonds = snap.val();
                    localStorage.setItem("zingoo_diamonds", diamonds);
                    document.getElementById("user-display-diamonds").innerText = parseInt(diamonds).toLocaleString();
                }
            });

            // Enter room automatically with full data
            initializeZingooAudioRoom();
        };

        async function initializeZingooAudioRoom() {
            // Update Room Header
            document.getElementById("room-header-title").innerText = activeRoomId.replace("room_", "").replace("_", " ").toUpperCase();

            // Set host details on visual container
            get(ref(db, `audio_rooms/${activeRoomId}`)).then((snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    if(data.hostAvatar) {
                        document.getElementById("room-header-avatar").src = data.hostAvatar;
                    }
                }
            });

            // Attach Firebase listeners
            attachZingooListeners();
        }

        function attachZingooListeners() {
            refSeats = ref(db, `audio_rooms/${activeRoomId}/seats`);
            onValue(refSeats, (snapshot) => {
                const seatsData = snapshot.val() || {};
                renderAudioRoomSeats(seatsData);
            });

            refSignals = ref(db, `audio_rooms/${activeRoomId}/signals/${currentUserId}`);
            onChildAdded(refSignals, handleSignalingSignal);

            // Connect Live Chat Feed
            refChat = ref(db, `audio_rooms/${activeRoomId}/chats`);
            onChildAdded(refChat, (snapshot) => {
                const msg = snapshot.val();
                if(msg) {
                    renderChatMessageBubble(msg);
                }
            });

            // Track viewers
            onValue(ref(db, `audio_rooms/${activeRoomId}/online`), (snapshot) => {
                const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 1;
                document.getElementById("room-online-count").innerText = count;
            });
            
            // Log user in online list
            set(ref(db, `audio_rooms/${activeRoomId}/online/${currentUserId}`), { name: currentUser, avatar: currentAvatar });
        }

        // Render Seats perfectly with custom Image 1 aesthetics (Lock symbol for empty, mute icon)
        function renderAudioRoomSeats(seatsData) {
            const grid = document.getElementById("audio-seats-container");
            grid.innerHTML = "";

            let currentlyOnSeat = false;

            for(let i = 0; i < 10; i++) {
                const occupant = seatsData[i];
                const seatIndexStr = `Seat ${i + 1}`;
                const elementId = `seat-${i}`;

                const outerDiv = document.createElement("div");
                outerDiv.id = elementId;
                outerDiv.className = "flex flex-col items-center cursor-pointer";

                if (occupant) {
                    if (occupant.user === currentUser) {
                        currentlyOnSeat = true;
                        currentSeatIndex = i;
                    }

                    const isSpeakingClass = occupant.isSpeaking ? "speaking-glow border-[#ff3b6b]" : "border-[#8e2de2]";
                    
                    outerDiv.onclick = () => showOccupantDetailsPopup(occupant, i);
                    outerDiv.innerHTML = `
                        <div class="relative w-16 h-16 rounded-full border-2 bg-[#2a2a35] ${isSpeakingClass} shadow-md transition-all">
                            <img src="${occupant.avatar}" class="w-full h-full rounded-full object-cover">
                            ${occupant.isMuted ? `
                                <div class="absolute -bottom-1 -right-1 bg-white rounded-full w-5 h-5 flex items-center justify-center border border-red-500 shadow-sm z-10">
                                    <span class="material-symbols-outlined text-[12px] text-red-500 font-bold" style="font-variation-settings: 'FILL' 1;">mic_off</span>
                                </div>
                            ` : ""}
                        </div>
                        <span class="text-gray-900 font-extrabold text-[11px] mt-1.5 truncate max-w-[65px] block text-center drop-shadow-sm">${occupant.user}</span>
                    `;
                } else {
                    // LOCKED / EMPTY SEAT matching Image 1
                    outerDiv.onclick = () => claimEmptyAudioSeat(i);
                    outerDiv.innerHTML = `
                        <div class="relative w-16 h-16 rounded-full border border-white/20 bg-white flex items-center justify-center shadow-inner hover:scale-105 active:scale-95 transition-all">
                            <span class="material-symbols-outlined text-[#ffbf00] text-[26px]">lock</span>
                        </div>
                        <span class="text-gray-800/80 font-bold text-[10px] mt-1.5 block text-center">${seatIndexStr}</span>
                    `;
                }

                grid.appendChild(outerDiv);
            }

            // Sync mic button UI based on seat status
            const micBtn = document.getElementById("room-mic-btn");
            if(currentlyOnSeat) {
                micBtn.disabled = false;
                if(localAudioStream && localAudioStream.getAudioTracks()[0]) {
                    const isMuted = !localAudioStream.getAudioTracks()[0].enabled;
                    document.getElementById("mic-status-icon").innerText = isMuted ? "mic_off" : "mic";
                }
            } else {
                micBtn.disabled = true;
                document.getElementById("mic-status-icon").innerText = "mic_off";
            }
        }

        // Claim seat logic + request mic
        window.claimEmptyAudioSeat = async function(index) {
            if(currentSeatIndex !== null) {
                alert("You already have a seat!");
                return;
            }

            try {
                // Request Hardware Mic Access
                localAudioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                
                currentSeatIndex = index;
                const seatRef = ref(db, `audio_rooms/${activeRoomId}/seats/${index}`);

                await set(seatRef, {
                    user: currentUser,
                    avatar: currentAvatar,
                    isMuted: false,
                    isSpeaking: false
                });

                // Clear seat on unexpected disconnect
                const disconnectRef = ref(db, `audio_rooms/${activeRoomId}/seats/${index}`);
                onDisconnect(disconnectRef).remove();

                // Setup default mic active state
                localAudioStream.getAudioTracks()[0].enabled = true;
                document.getElementById("mic-status-icon").innerText = "mic";

                // Publish audio to existing sitters in mesh topology
                get(refSeats).then((snap) => {
                    const currentSeats = snap.val() || {};
                    for(let i in currentSeats) {
                        const peer = currentSeats[i];
                        if (peer.user !== currentUser) {
                            establishPeerCall(peer.id || peer.user);
                        }
                    }
                });

                push(refChat, { user: currentUser, text: "took a seat.", system: true });

            } catch (err) {
                console.error("Mic Error:", err);
                alert("Microphone hardware permission is mandatory to take a seat.");
            }
        };

        // WebRTC Signaling Protocol implementation
        function getOrCreateConnection(targetUserId) {
            if(activePeerConnections[targetUserId]) {
                return activePeerConnections[targetUserId];
            }

            const pc = new RTCPeerConnection(rtcConfig);
            activePeerConnections[targetUserId] = pc;
            candidateQueues[targetUserId] = [];

            if (localAudioStream) {
                localAudioStream.getTracks().forEach(track => pc.addTrack(track, localAudioStream));
            }

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    dispatchSignalingMessage(targetUserId, {
                        type: 'ice',
                        candidate: event.candidate.toJSON()
                    });
                }
            };

            pc.ontrack = (event) => {
                console.log(`Track received from: ${targetUserId}`);
                const stream = new MediaStream([event.track]);
                
                const elementId = `audio_sink_${targetUserId}`;
                let audioEl = document.getElementById(elementId);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = elementId;
                    audioEl.autoplay = true;
                    audioEl.playsInline = true;
                    document.getElementById('remote-audio-hub').appendChild(audioEl);
                }
                audioEl.srcObject = stream;
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    teardownPeerConnection(targetUserId);
                }
            };

            return pc;
        }

        async function dispatchSignalingMessage(targetUserId, data) {
            const targetSignalRef = ref(db, `audio_rooms/${activeRoomId}/signals/${targetUserId}`);
            await push(targetSignalRef, {
                senderId: currentUserId,
                senderName: currentUser,
                ...data
            });
        }

        async function establishPeerCall(targetUserId) {
            console.log(`Dialing Peer: ${targetUserId}`);
            const pc = getOrCreateConnection(targetUserId);
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            dispatchSignalingMessage(targetUserId, {
                type: 'offer',
                sdp: offer.sdp
            });
        }

        async function handleSignalingSignal(snapshot) {
            const data = snapshot.val();
            const senderId = data.senderId;
            const signalKey = snapshot.key;
            
            // Delete signals directly to avoid database payload accumulation
            remove(ref(db, `audio_rooms/${activeRoomId}/signals/${currentUserId}/${signalKey}`));

            if (senderId === currentUserId) return;

            let pc = activePeerConnections[senderId];

            try {
                if (data.type === 'offer') {
                    pc = getOrCreateConnection(senderId);
                    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
                    
                    flushIceCandidateQueue(senderId, pc);

                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);

                    dispatchSignalingMessage(senderId, {
                        type: 'answer',
                        sdp: answer.sdp
                    });

                } else if (data.type === 'answer') {
                    if (pc) {
                        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp }));
                        flushIceCandidateQueue(senderId, pc);
                    }

                } else if (data.type === 'ice') {
                    if (pc && pc.remoteDescription && pc.remoteDescription.type) {
                        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } else {
                        if(!candidateQueues[senderId]) candidateQueues[senderId] = [];
                        candidateQueues[senderId].push(data.candidate);
                    }
                }
            } catch (err) {
                console.error("Signaling Process failure:", err);
            }
        }

        async function flushIceCandidateQueue(peerId, pc) {
            if (candidateQueues[peerId] && candidateQueues[peerId].length > 0) {
                for (let candidate of candidateQueues[peerId]) {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch(e) {
                        console.error("Queue candidates mismatch:", e);
                    }
                }
                candidateQueues[peerId] = [];
            }
        }

        function teardownPeerConnection(peerId) {
            if(activePeerConnections[peerId]) {
                activePeerConnections[peerId].close();
                delete activePeerConnections[peerId];
            }
            const el = document.getElementById(`audio_sink_${peerId}`);
            if(el) el.remove();
        }

        // Toggle hardware audio stream
        window.toggleSeatMicHardware = async function() {
            if(!localAudioStream || currentSeatIndex === null) return;
            
            const audioTrack = localAudioStream.getAudioTracks()[0];
            if(audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                const isMuted = !audioTrack.enabled;
                
                document.getElementById("mic-status-icon").innerText = isMuted ? "mic_off" : "mic";

                await update(ref(db, `audio_rooms/${activeRoomId}/seats/${currentSeatIndex}`), {
                    isMuted: isMuted
                });
            }
        };

        // Real-Time Message Console rendering
        function renderChatMessageBubble(msg) {
            const consoleBox = document.getElementById("audio-chat-console");
            
            const div = document.createElement("div");
            div.className = "chat-pill text-white text-xs font-bold px-4 py-2 rounded-2xl w-fit max-w-[90%] flex flex-col gap-0.5 shadow pointer-events-auto";
            
            if(msg.system) {
                div.innerHTML = `<span class="text-yellow-400 font-extrabold flex items-center gap-1">${msg.user} <span class="text-white/80 font-normal">${msg.text}</span></span>`;
            } else {
                div.innerHTML = `<span class="text-yellow-400 font-black">${msg.user}:</span> <span class="text-white font-medium break-all">${msg.text}</span>`;
            }

            consoleBox.appendChild(div);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        window.toggleChatConsoleInput = function() {
            const modal = document.getElementById("chat-composer-modal");
            const val = modal.classList.contains("hidden");
            if(val) {
                modal.classList.remove("hidden");
                modal.classList.add("flex");
                document.getElementById("chat-input-composer").focus();
            } else {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }
        };

        window.sendChatMessage = async function() {
            const input = document.getElementById("chat-input-composer");
            const val = input.value.trim();
            if(!val) return;

            await push(ref(db, `audio_rooms/${activeRoomId}/chats`), {
                user: currentUser,
                text: val,
                timestamp: Date.now()
            });

            input.value = "";
            toggleChatConsoleInput();
        };

        // Diamond redirect handler
        window.openDiamondStoreRedirect = function() {
            window.location.href = `zingoo-pay.html?from=zingoo&username=${encodeURIComponent(currentUser)}&amount=100&diamonds=300`;
        };

        window.triggerDirectPayment = function(amount, diamonds) {
            window.location.href = `zingoo-pay.html?from=zingoo&username=${encodeURIComponent(currentUser)}&amount=${amount}&diamonds=${diamonds}`;
        };

        // Gift Bottom Sheet Handlers
        let activeGiftTab = 'gifts';
        window.openZingooGiftsSheet = function() {
            document.getElementById("gift-bottom-sheet").style.display = "flex";
            renderGiftItems();
        };

        window.closeZingooGiftsSheet = function() {
            document.getElementById("gift-bottom-sheet").style.display = "none";
        };

        window.switchGiftSheetTab = function(tab) {
            activeGiftTab = tab;
            const tabGifts = document.getElementById("tab-btn-gifts");
            const tabAssets = document.getElementById("tab-btn-assets");

            if (tab === 'gifts') {
                tabGifts.className = "text-sm font-black text-dia-red border-b-2 border-[#ff004c] pb-1.5 transition-all";
                tabAssets.className = "text-sm font-bold text-gray-400 pb-1.5 transition-all";
            } else {
                tabAssets.className = "text-sm font-black text-dia-red border-b-2 border-[#ff004c] pb-1.5 transition-all";
                tabGifts.className = "text-sm font-bold text-gray-400 pb-1.5 transition-all";
            }
            renderGiftItems();
        };

        async function renderGiftItems() {
            const container = document.getElementById("gift-grid-viewport");
            container.innerHTML = `<p class="text-center text-gray-400 text-xs mt-10">Syncing Store Inventory...</p>`;

            let queryRef = ref(db, "gifts");
            if (activeGiftTab === 'assets') {
                queryRef = ref(db, "store_items/chairs"); // Fetch chairs from store_items node
            }

            try {
                const snapshot = await get(queryRef);
                container.innerHTML = "";

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const grid = document.createElement("div");
                    grid.className = "grid grid-cols-4 gap-4 p-1";

                    Object.entries(data).forEach(([key, item]) => {
                        grid.insertAdjacentHTML('beforeend', `
                            <div onclick="processGiftTransaction('${item.cost}', '${item.name}', '${item.imageUrl}')" class="flex flex-col items-center bg-gray-50 border border-gray-100 rounded-2xl p-2.5 cursor-pointer hover:border-[#ff004c]/30 transform active:scale-95 transition-all">
                                <img src="${item.imageUrl}" class="w-12 h-12 object-contain mb-1 drop-shadow-md">
                                <span class="text-gray-900 font-extrabold text-[10px] truncate w-full text-center">${item.name}</span>
                                <span class="text-purple-600 font-black text-[9px] flex items-center gap-0.5 mt-0.5">💎 ${item.cost}</span>
                            </div>
                        `);
                    });
                    container.appendChild(grid);
                } else {
                    container.innerHTML = `<p class="text-center text-gray-400 text-xs mt-10">No items configured in store database.</p>`;
                }
            } catch(e) {
                container.innerHTML = `<p class="text-center text-red-500 text-xs mt-10">Database connection interrupted.</p>`;
            }
        }

        window.processGiftTransaction = async function(cost, giftName, imageUrl) {
            cost = parseInt(cost);
            let userDiamonds = parseInt(localStorage.getItem("zingoo_diamonds") || "0");

            if(userDiamonds < cost) {
                if(confirm("Insufficient Diamonds! Would you like to buy more from Zingoo secure gateway?")) {
                    // Redirect directly to payment flow for matching gift costs
                    window.location.href = `zingoo-pay.html?from=zingoo&username=${encodeURIComponent(currentUser)}&amount=100&diamonds=300`;
                }
                return;
            }

            // Deduct locally and sync via Firebase
            const nextBalance = userDiamonds - cost;
            await update(ref(db, `users/${currentUser}`), { diamonds: nextBalance });

            // Dispatch transaction status to room chats
            await push(refChat, {
                user: currentUser,
                text: `gifted Room ${giftName} ! 💎`,
                system: true
            });

            closeZingooGiftsSheet();
            alert(`Sent ${giftName} successfully!`);
        };

        // Complete termination sequence on leaving
        window.leaveRoomProcess = async function() {
            if(confirm("Exit Audio Room?")) {
                if (currentSeatIndex !== null) {
                    await remove(ref(db, `audio_rooms/${activeRoomId}/seats/${currentSeatIndex}`));
                }

                // Stop hardware processes
                if (localAudioStream) {
                    localAudioStream.getTracks().forEach(track => track.stop());
                }

                for(let peerId in activePeerConnections) {
                    teardownPeerConnection(peerId);
                }

                // Log out from online directory
                await remove(ref(db, `audio_rooms/${activeRoomId}/online/${currentUserId}`));

                // Unsubscribe signaling listeners
                if(refSeats) off(refSeats);
                if(refSignals) off(refSignals);
                if(refChat) off(refChat);

                // Exit back to home
                window.location.href = "index.html";
            }
        };

        // Occupant Details popup
        window.showOccupantDetailsPopup = function(occupant, seatId) {
            alert(`Sitter Profile: @${occupant.user}\nSitting on Seat #${seatId + 1}`);
        };
    </script>
</body>
</html>
