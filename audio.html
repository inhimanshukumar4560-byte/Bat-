<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Live Room (WebRTC Mesh)</title>
    <style>
        /* =========================================
           CSS STYLES & THEMING (Black / Gold / Hot Pink)
           ========================================= */
        :root {
            --bg-color: #0d0d12;
            --surface-color: #1a1a24;
            --gold: #FFD700;
            --pink: #FF1493;
            --text-main: #FFFFFF;
            --text-muted: #888899;
            --border-radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body, html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Screen Management */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: absolute;
            top: 0; left: 0;
        }
        .screen.active { display: flex; }

        /* UI Components */
        .btn {
            background: linear-gradient(45deg, var(--pink), var(--gold));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn:disabled { filter: grayscale(100%); cursor: not-allowed; }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--surface-color);
            color: white;
            font-size: 16px;
        }

        /* Login Screen */
        #login-screen { justify-content: center; align-items: center; padding: 20px; }
        .login-box {
            background: var(--surface-color);
            padding: 30px;
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-box h1 { margin-bottom: 20px; color: var(--gold); }
        .avatar-preview {
            width: 100px; height: 100px; border-radius: 50%;
            background: #333; margin: 0 auto 15px;
            object-fit: cover; display: block; border: 2px solid var(--pink);
        }

        /* Lobby Screen */
        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--surface-color); border-bottom: 1px solid #333;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; }
        .diamond-balance { color: var(--gold); font-weight: bold; }
        
        .room-list { flex: 1; overflow-y: auto; padding: 20px; }
        .room-card {
            background: var(--surface-color); padding: 20px;
            border-radius: var(--border-radius); margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--pink);
        }
        .room-info h3 { margin-bottom: 5px; color: var(--gold); }
        .room-info p { color: var(--text-muted); font-size: 14px; }
        
        .floating-add-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--pink); color: white;
            font-size: 30px; border: none; box-shadow: 0 4px 15px rgba(255,20,147,0.4);
            cursor: pointer;
        }

        /* Live Room Screen */
        .room-header { padding: 15px; background: var(--surface-color); text-align: center; }
        .seats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; padding: 20px;
        }
        .seat {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }
        .seat-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: #2a2a35; border: 2px dashed #555;
            display: flex; justify-content: center; align-items: center;
            position: relative; object-fit: cover;
        }
        .seat.occupied .seat-avatar { border: 2px solid var(--gold); border-style: solid; }
        .seat.speaking .seat-avatar { border-color: var(--pink); box-shadow: 0 0 15px var(--pink); }
        .seat-name { font-size: 12px; margin-top: 5px; color: var(--text-muted); text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mic-muted-icon {
            position: absolute; bottom: 0; right: 0;
            background: red; color: white; border-radius: 50%;
            width: 20px; height: 20px; font-size: 12px; display: flex; justify-content: center; align-items: center;
        }

        /* Floating Chat */
        .chat-container {
            position: absolute; bottom: 80px; left: 10px; right: 10px;
            max-height: 200px; overflow-y: auto; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-bottom: 10px;
        }
        .chat-message {
            background: rgba(0,0,0,0.5); padding: 8px 12px;
            border-radius: 12px; margin-bottom: 5px; width: fit-content;
            max-width: 80%; pointer-events: auto; font-size: 14px;
        }
        .chat-message span.sender { color: var(--gold); font-weight: bold; margin-right: 5px; }

        /* Bottom Action Bar */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 70px; background: var(--surface-color);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #333;
        }
        .icon-btn {
            background: #333; border: none; color: white;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 18px; cursor: pointer;
        }
        .icon-btn.active { background: var(--pink); }
        .leave-btn { background: #ff4444; }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--surface-color); padding: 25px;
            border-radius: var(--border-radius); width: 90%; max-width: 350px;
            position: relative;
        }
        .close-modal {
            position: absolute; top: 15px; right: 15px;
            background: transparent; border: none; color: white; font-size: 20px; cursor: pointer;
        }

        #audio-container { display: none; }
        
        /* Utility Classes */
        .d-none { display: none !important; }
        .d-flex { display: flex !important; }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h1>AudioLive</h1>
            <img id="avatar-preview" class="avatar-preview" src="https://i.ibb.co/6HvwbJ0/default-avatar.png" alt="Avatar">
            <input type="file" id="avatar-input" accept="image/*">
            <input type="text" id="username-input" placeholder="Enter your Unique ID/Name">
            <button id="login-btn" class="btn">Login & Enter</button>
            <p id="login-status" style="color:var(--gold); margin-top:10px; font-size:14px;"></p>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="lobby-screen" class="screen">
        <div class="header">
            <div class="user-info">
                <img id="my-lobby-avatar" src="" alt="Me">
                <div>
                    <h4 id="my-lobby-name">Name</h4>
                    <div class="diamond-balance">💎 <span id="my-diamonds">1000</span></div>
                </div>
            </div>
            <button id="logout-btn" class="btn-outline btn" style="padding: 8px 15px; font-size: 14px;">Logout</button>
        </div>
        <div class="room-list" id="room-list">
            <!-- Rooms will be dynamically injected here -->
        </div>
        <button class="floating-add-btn" onclick="showModal('create-room-modal')">+</button>
    </div>

    <!-- 3. LIVE ROOM SCREEN -->
    <div id="room-screen" class="screen">
        <div class="room-header">
            <h2 id="room-title">Room Name</h2>
            <p style="color:var(--text-muted); font-size:12px;">Host: <span id="room-host-name">Host</span> | Entry: 💎<span id="room-entry-fee">0</span></p>
        </div>
        
        <div class="seats-grid" id="seats-grid">
            <!-- Seats dynamically generated -->
        </div>

        <div class="chat-container" id="chat-container">
            <!-- Chat messages dynamically generated -->
        </div>

        <div class="bottom-bar">
            <button class="icon-btn" onclick="showModal('chat-modal')">💬</button>
            <button class="icon-btn" onclick="alert('Gift Feature Coming Soon!')">🎁</button>
            <button class="icon-btn" id="mic-toggle-btn" disabled>🎤</button>
            <button class="icon-btn leave-btn" id="leave-room-btn">✖</button>
        </div>
    </div>

    <!-- MODALS -->

    <!-- Create Room Modal -->
    <div class="modal-overlay" id="create-room-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="hideModal('create-room-modal')">✖</button>
            <h2 style="margin-bottom:20px; color:var(--gold);">Create Room</h2>
            <input type="text" id="new-room-name" placeholder="Room Topic (e.g. Chill Beats)">
            <input type="number" id="new-room-fee" placeholder="Entry Fee in Diamonds (default 0)" value="0">
            <input type="number" id="new-room-seats" placeholder="Max Seats (default 10)" value="10">
            <button class="btn" id="create-room-submit" style="width:100%;">Create & Join</button>
        </div>
    </div>

    <!-- Chat Input Modal (For mobile friendly typing) -->
    <div class="modal-overlay" id="chat-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="hideModal('chat-modal')">✖</button>
            <h3 style="margin-bottom:15px;">Send Message</h3>
            <input type="text" id="chat-input" placeholder="Type something nice...">
            <button class="btn" id="send-chat-btn" style="width:100%;">Send</button>
        </div>
    </div>

    <!-- Profile Popup Modal -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal-content" style="text-align: center;">
            <button class="close-modal" onclick="hideModal('profile-modal')">✖</button>
            <img id="profile-modal-avatar" src="" style="width:80px;height:80px;border-radius:50%;margin-bottom:10px;">
            <h2 id="profile-modal-name" style="color:var(--gold); margin-bottom: 20px;">User Name</h2>
            
            <div id="host-controls" class="d-none" style="display:flex; gap:10px; justify-content:center;">
                <button class="btn btn-outline" id="kick-user-btn" style="color:red; border-color:red;">Kick User</button>
                <button class="btn btn-outline" id="mute-user-btn">Mute User</button>
            </div>
            <button class="btn" style="width:100%; margin-top:15px;" onclick="alert('1-on-1 Call Request Sent!')">Request 1-on-1 Call</button>
        </div>
    </div>

    <!-- Audio Element Container for WebRTC Tracks -->
    <div id="audio-container"></div>


    <!-- =========================================
         JAVASCRIPT LOGIC (Firebase V9 + WebRTC)
         ========================================= -->
    <script type="module">
        // 1. IMPORT FIREBASE MODULAR SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getDatabase, ref, set, get, onValue, push, update, remove, 
            onChildAdded, onChildChanged, onChildRemoved, onDisconnect, off 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 2. CONFIGURATIONS
        const IMGBB_API_KEY = "74f145f340cd03006d649ab081ebdc9c";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // STUN Servers for WebRTC
        const rtcConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:global.stun.twilio.com:3478" }
            ]
        };

        // 3. GLOBAL STATE
        let currentUser = null; 
        let currentRoomId = null;
        let mySeatIndex = null;
        let roomDataCache = null;
        
        // WebRTC States
        let localStream = null;
        let peerConnections = {}; // Map: userId -> RTCPeerConnection
        let iceCandidateQueues = {}; // Map: userId -> Array of ICE Candidates (RACE CONDITION FIX)
        
        // Firebase Listeners references (to detach later)
        let roomSeatsRef = null;
        let mySignalRef = null;
        let chatRef = null;
        let myDisconnectRef = null;

        // 4. UI UTILITIES
        window.showModal = (id) => document.getElementById(id).classList.add('active');
        window.hideModal = (id) => document.getElementById(id).classList.remove('active');
        const showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // 5. LOGIN & IMGBB UPLOAD LOGIC
        const avatarInput = document.getElementById('avatar-input');
        const avatarPreview = document.getElementById('avatar-preview');
        const loginBtn = document.getElementById('login-btn');
        let uploadedAvatarUrl = "https://i.ibb.co/6HvwbJ0/default-avatar.png";

        avatarInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            document.getElementById('login-status').innerText = "Uploading Avatar...";
            loginBtn.disabled = true;

            const formData = new FormData();
            formData.append("image", file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(data.success) {
                    uploadedAvatarUrl = data.data.url;
                    avatarPreview.src = uploadedAvatarUrl;
                    document.getElementById('login-status').innerText = "Avatar Uploaded!";
                } else {
                    alert("Upload failed. Using default.");
                }
            } catch (err) {
                console.error("ImgBB Error:", err);
                alert("Upload failed.");
            }
            loginBtn.disabled = false;
        });

        loginBtn.addEventListener('click', () => {
            const username = document.getElementById('username-input').value.trim();
            if(!username) return alert("Enter Unique ID/Name!");

            // Check if user exists in local storage, else create
            const storedUser = JSON.parse(localStorage.getItem('audioUser') || '{}');
            let userId = storedUser.id || 'user_' + Math.random().toString(36).substr(2, 9);
            let diamonds = storedUser.diamonds || 1000;

            currentUser = { id: userId, name: username, avatar: uploadedAvatarUrl, diamonds: diamonds };
            localStorage.setItem('audioUser', JSON.stringify(currentUser));

            // Update UI
            document.getElementById('my-lobby-avatar').src = currentUser.avatar;
            document.getElementById('my-lobby-name').innerText = currentUser.name;
            document.getElementById('my-diamonds').innerText = currentUser.diamonds;

            showScreen('lobby-screen');
            fetchRooms();
        });

        // Auto-login check
        window.onload = () => {
            const storedUser = JSON.parse(localStorage.getItem('audioUser'));
            if(storedUser && storedUser.id) {
                document.getElementById('username-input').value = storedUser.name;
                avatarPreview.src = storedUser.avatar;
                uploadedAvatarUrl = storedUser.avatar;
            }
        };

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('audioUser');
            location.reload();
        });

        // 6. LOBBY & ROOM MANAGEMENT
        function fetchRooms() {
            const roomsRef = ref(db, 'rooms');
            onValue(roomsRef, (snapshot) => {
                // Only update if we are on lobby screen
                if(!document.getElementById('lobby-screen').classList.contains('active')) return;
                
                const roomList = document.getElementById('room-list');
                roomList.innerHTML = '';
                const rooms = snapshot.val();
                
                if(!rooms) {
                    roomList.innerHTML = '<p style="text-align:center; color:#888;">No active rooms. Create one!</p>';
                    return;
                }

                for(let roomId in rooms) {
                    const room = rooms[roomId];
                    const seatCount = room.seats ? Object.keys(room.seats).length : 0;
                    
                    const div = document.createElement('div');
                    div.className = 'room-card';
                    div.innerHTML = `
                        <div class="room-info">
                            <h3>${room.name}</h3>
                            <p>Host: ${room.hostName} | Seats: ${seatCount}/${room.maxSeats}</p>
                            <p style="color:var(--gold)">Entry: 💎${room.entryFee}</p>
                        </div>
                        <button class="btn" onclick="joinRoom('${roomId}')">Join</button>
                    `;
                    roomList.appendChild(div);
                }
            });
        }

        document.getElementById('create-room-submit').addEventListener('click', async () => {
            const name = document.getElementById('new-room-name').value || 'Chill Room';
            const fee = parseInt(document.getElementById('new-room-fee').value) || 0;
            const maxSeats = parseInt(document.getElementById('new-room-seats').value) || 10;

            if(currentUser.diamonds < fee) return alert("Not enough diamonds to set this fee!");

            const roomId = 'room_' + Date.now();
            const newRoomRef = ref(db, `rooms/${roomId}`);
            
            await set(newRoomRef, {
                id: roomId,
                name: name,
                entryFee: fee,
                maxSeats: maxSeats,
                hostId: currentUser.id,
                hostName: currentUser.name,
                createdAt: Date.now()
            });

            hideModal('create-room-modal');
            joinRoom(roomId);
        });

        window.joinRoom = async (roomId) => {
            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await get(roomRef);
            if(!snapshot.exists()) return alert("Room no longer exists!");

            const room = snapshot.val();
            if(currentUser.diamonds < room.entryFee) return alert("Not enough diamonds to enter!");

            // Deduct diamonds locally (for production, do this server-side securely)
            if(room.entryFee > 0 && currentUser.id !== room.hostId) {
                currentUser.diamonds -= room.entryFee;
                localStorage.setItem('audioUser', JSON.stringify(currentUser));
                document.getElementById('my-diamonds').innerText = currentUser.diamonds;
            }

            currentRoomId = roomId;
            roomDataCache = room;
            
            // Setup UI
            document.getElementById('room-title').innerText = room.name;
            document.getElementById('room-host-name').innerText = room.hostName;
            document.getElementById('room-entry-fee').innerText = room.entryFee;
            document.getElementById('chat-container').innerHTML = ''; // Clear chat
            
            showScreen('room-screen');
            
            // Attach Listeners
            attachRoomListeners();
            setupChat();
        };

        // 7. SEAT LOGIC & UI
        function attachRoomListeners() {
            roomSeatsRef = ref(db, `rooms/${currentRoomId}/seats`);
            
            onValue(roomSeatsRef, (snapshot) => {
                const seatsData = snapshot.val() || {};
                renderSeatsGrid(roomDataCache.maxSeats, seatsData);
            });
            
            // Listen for signaling (WebRTC)
            mySignalRef = ref(db, `rooms/${currentRoomId}/signals/${currentUser.id}`);
            onChildAdded(mySignalRef, handleIncomingSignal);
        }

        function renderSeatsGrid(maxSeats, seatsData) {
            const grid = document.getElementById('seats-grid');
            grid.innerHTML = '';
            
            // Check if I am currently sitting
            let amISitting = false;

            for(let i = 0; i < maxSeats; i++) {
                const seatUser = seatsData[i];
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                
                if(seatUser) {
                    if(seatUser.id === currentUser.id) {
                        amISitting = true;
                        mySeatIndex = i;
                    }

                    seatDiv.classList.add('occupied');
                    if(seatUser.isSpeaking) seatDiv.classList.add('speaking'); // Voice activity UI

                    seatDiv.innerHTML = `
                        <div class="seat-avatar" onclick="openProfile('${seatUser.id}', '${seatUser.name}', '${seatUser.avatar}')">
                            <img src="${seatUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">
                            ${seatUser.isMuted ? '<div class="mic-muted-icon">🔇</div>' : ''}
                        </div>
                        <div class="seat-name">${seatUser.name}</div>
                    `;
                } else {
                    seatDiv.innerHTML = `
                        <div class="seat-avatar" onclick="takeEmptySeat(${i})">
                            <span style="color:#555;font-size:24px;">+</span>
                        </div>
                        <div class="seat-name">Empty</div>
                    `;
                }
                grid.appendChild(seatDiv);
            }

            // Enable/Disable Mic button based on sitting status
            const micBtn = document.getElementById('mic-toggle-btn');
            if(amISitting) {
                micBtn.disabled = false;
                if(localStream && localStream.getAudioTracks()[0]) {
                    micBtn.innerText = localStream.getAudioTracks()[0].enabled ? '🎤' : '🔇';
                    micBtn.classList.toggle('active', !localStream.getAudioTracks()[0].enabled);
                }
            } else {
                micBtn.disabled = true;
                micBtn.innerText = '🎤';
                micBtn.classList.remove('active');
            }
        }

        window.takeEmptySeat = async (index) => {
            if(mySeatIndex !== null) return alert("You already have a seat!");

            try {
                // 1. Request Microphone permission first!
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                
                // 2. Register seat in Firebase
                mySeatIndex = index;
                const mySeatPath = `rooms/${currentRoomId}/seats/${index}`;
                const seatRef = ref(db, mySeatPath);
                
                const seatData = {
                    id: currentUser.id,
                    name: currentUser.name,
                    avatar: currentUser.avatar,
                    isMuted: false,
                    isSpeaking: false // Can implement Hark.js later for real activity
                };

                await set(seatRef, seatData);

                // Setup disconnect hook so seat clears if window closes
                myDisconnectRef = onDisconnect(seatRef);
                myDisconnectRef.remove();

                // 3. Initiate WebRTC Mesh Connections (Offerer Role)
                // Fetch current users on seats to call them
                const snapshot = await get(roomSeatsRef);
                const currentSeats = snapshot.val() || {};
                
                for(let i in currentSeats) {
                    const peer = currentSeats[i];
                    // Don't call yourself
                    if(peer.id !== currentUser.id) {
                        initiateCall(peer.id);
                    }
                }

            } catch (err) {
                console.error("Mic error:", err);
                alert("Microphone permission required to take a seat!");
            }
        };


        // 8. WEBRTC MESH NETWORK LOGIC (HEAVILY OPTIMIZED)

        // Function to create standard RTCPeerConnection
        function createPeerConnection(peerId) {
            if(peerConnections[peerId]) return peerConnections[peerId];

            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[peerId] = pc;
            iceCandidateQueues[peerId] = []; // Initialize empty queue for ICE race condition

            // Add local audio track to connection
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            // Handle ICE Candidates generated locally -> send to Firebase
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal(peerId, {
                        type: 'ice',
                        candidate: event.candidate.toJSON()
                    });
                }
            };

            // Handle incoming remote audio track -> Attach to HTML Audio element
            pc.ontrack = (event) => {
                console.log(`Received track from ${peerId}`);
                
                // FIX FOR MOBILE SAFARI/CHROME: Use new MediaStream([event.track])
                const stream = new MediaStream([event.track]);
                
                const audioId = `audio_${peerId}`;
                let audioEl = document.getElementById(audioId);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = audioId;
                    audioEl.autoplay = true;
                    // FIX: playsInline for iOS
                    audioEl.playsInline = true; 
                    document.getElementById('audio-container').appendChild(audioEl);
                }
                audioEl.srcObject = stream;
            };

            pc.onconnectionstatechange = () => {
                console.log(`Connection with ${peerId}: ${pc.connectionState}`);
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    cleanupPeer(peerId);
                }
            };

            return pc;
        }

        // Send signaling message via Firebase
        async function sendSignal(targetId, data) {
            const targetSignalRef = ref(db, `rooms/${currentRoomId}/signals/${targetId}`);
            await push(targetSignalRef, {
                senderId: currentUser.id,
                ...data
            });
        }

        // Initiator (Newcomer) creates Offer
        async function initiateCall(peerId) {
            console.log(`Initiating call to ${peerId}`);
            const pc = createPeerConnection(peerId);
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            sendSignal(peerId, {
                type: 'offer',
                sdp: offer.sdp
            });
        }

        // Handle incoming signaling messages from Firebase
        async function handleIncomingSignal(snapshot) {
            const data = snapshot.val();
            const senderId = data.senderId;
            const signalKey = snapshot.key;
            
            // Immediately remove the signal from DB after reading to keep DB clean
            remove(ref(db, `rooms/${currentRoomId}/signals/${currentUser.id}/${signalKey}`));

            if (senderId === currentUser.id) return; // Ignore own signals (safety)

            let pc = peerConnections[senderId];

            try {
                if (data.type === 'offer') {
                    console.log(`Received offer from ${senderId}`);
                    // Existing user receives offer from newcomer
                    pc = createPeerConnection(senderId);
                    
                    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
                    
                    // Process any ICE candidates that arrived before the offer
                    processIceQueue(senderId, pc);

                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);

                    sendSignal(senderId, {
                        type: 'answer',
                        sdp: answer.sdp
                    });

                } else if (data.type === 'answer') {
                    console.log(`Received answer from ${senderId}`);
                    if (pc) {
                        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp }));
                        processIceQueue(senderId, pc);
                    }

                } else if (data.type === 'ice') {
                    // ICE CANDIDATE RACE CONDITION FIX
                    // If remote description isn't set yet, queue the candidate!
                    if (pc && pc.remoteDescription && pc.remoteDescription.type) {
                        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } else {
                        console.log(`Queueing ICE candidate for ${senderId}`);
                        if(!iceCandidateQueues[senderId]) iceCandidateQueues[senderId] = [];
                        iceCandidateQueues[senderId].push(data.candidate);
                    }
                }
            } catch (err) {
                console.error("WebRTC Signaling Error:", err);
            }
        }

        // Process queued ICE candidates after remote description is set
        async function processIceQueue(peerId, pc) {
            if (iceCandidateQueues[peerId] && iceCandidateQueues[peerId].length > 0) {
                console.log(`Processing ${iceCandidateQueues[peerId].length} queued ICE candidates for ${peerId}`);
                for (let candidate of iceCandidateQueues[peerId]) {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch(e) {
                        console.error("Error adding queued ICE", e);
                    }
                }
                iceCandidateQueues[peerId] = []; // clear queue
            }
        }

        function cleanupPeer(peerId) {
            if(peerConnections[peerId]) {
                peerConnections[peerId].close();
                delete peerConnections[peerId];
            }
            const audioEl = document.getElementById(`audio_${peerId}`);
            if(audioEl) audioEl.remove();
        }

        // 9. HARDWARE CONTROLS (MIC TOGGLE)
        document.getElementById('mic-toggle-btn').addEventListener('click', async (e) => {
            if(!localStream || mySeatIndex === null) return;
            
            const audioTrack = localStream.getAudioTracks()[0];
            if(audioTrack) {
                // Toggle physical hardware track
                audioTrack.enabled = !audioTrack.enabled;
                const isMuted = !audioTrack.enabled;
                
                // UI update
                e.target.innerText = isMuted ? '🔇' : '🎤';
                e.target.classList.toggle('active', isMuted);

                // Firebase sync (updates UI for everyone)
                await update(ref(db, `rooms/${currentRoomId}/seats/${mySeatIndex}`), {
                    isMuted: isMuted
                });
            }
        });

        // 10. CHAT SYSTEM
        function setupChat() {
            chatRef = ref(db, `rooms/${currentRoomId}/chat`);
            const chatContainer = document.getElementById('chat-container');
            
            onChildAdded(chatRef, (snapshot) => {
                const msg = snapshot.val();
                const div = document.createElement('div');
                div.className = 'chat-message';
                div.innerHTML = `<span class="sender">${msg.senderName}:</span> ${msg.text}`;
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

        document.getElementById('send-chat-btn').addEventListener('click', async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !currentRoomId) return;

            await push(ref(db, `rooms/${currentRoomId}/chat`), {
                senderId: currentUser.id,
                senderName: currentUser.name,
                text: text,
                timestamp: Date.now()
            });

            input.value = '';
            hideModal('chat-modal');
        });

        // 11. PROFILE & MODERATION (KICK/MUTE)
        let selectedUserId = null;
        window.openProfile = (userId, name, avatar) => {
            selectedUserId = userId;
            document.getElementById('profile-modal-avatar').src = avatar;
            document.getElementById('profile-modal-name').innerText = name;
            
            const hostControls = document.getElementById('host-controls');
            // If I am host, and I clicked someone else
            if(roomDataCache.hostId === currentUser.id && userId !== currentUser.id) {
                hostControls.classList.remove('d-none');
            } else {
                hostControls.classList.add('d-none');
            }

            showModal('profile-modal');
        };

        document.getElementById('kick-user-btn').addEventListener('click', async () => {
            if(!selectedUserId || !roomDataCache) return;
            
            // Find the seat index of the user to kick
            const snapshot = await get(roomSeatsRef);
            const seats = snapshot.val() || {};
            for(let i in seats) {
                if(seats[i].id === selectedUserId) {
                    await remove(ref(db, `rooms/${currentRoomId}/seats/${i}`));
                    alert("User Kicked from seat!");
                    hideModal('profile-modal');
                    break;
                }
            }
        });

        document.getElementById('mute-user-btn').addEventListener('click', async () => {
            if(!selectedUserId || !roomDataCache) return;
            
            // Update the user's mute state in DB
            const snapshot = await get(roomSeatsRef);
            const seats = snapshot.val() || {};
            for(let i in seats) {
                if(seats[i].id === selectedUserId) {
                    await update(ref(db, `rooms/${currentRoomId}/seats/${i}`), { isMuted: true });
                    alert("User Muted (State Updated in DB)");
                    hideModal('profile-modal');
                    break;
                }
            }
        });

        // 12. LEAVE ROOM LOGIC
        document.getElementById('leave-room-btn').addEventListener('click', async () => {
            if(confirm("Are you sure you want to leave the room?")) {
                
                // Remove self from seat if sitting
                if(mySeatIndex !== null) {
                    await remove(ref(db, `rooms/${currentRoomId}/seats/${mySeatIndex}`));
                    if(myDisconnectRef) myDisconnectRef.cancel();
                    mySeatIndex = null;
                }

                // Stop local microphone
                if(localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }

                // Close all WebRTC Peer Connections
                for(let peerId in peerConnections) {
                    cleanupPeer(peerId);
                }
                peerConnections = {};
                iceCandidateQueues = {};

                // Detach Firebase Listeners
                if(roomSeatsRef) off(roomSeatsRef);
                if(mySignalRef) off(mySignalRef);
                if(chatRef) off(chatRef);

                currentRoomId = null;
                roomDataCache = null;

                // Clear audio elements
                document.getElementById('audio-container').innerHTML = '';

                showScreen('lobby-screen');
            }
        });

    </script>
</body>
</html>
