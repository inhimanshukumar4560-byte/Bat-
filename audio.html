<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Live Audio Room</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'outfit': ['Outfit', 'sans-serif'], 'syne': ['Syne', 'sans-serif'] },
                    colors: { primary: '#ff758c', secondary: '#ff7eb3', dark: '#2b1029' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); background-attachment: fixed; color: white; overflow-x: hidden; }
        .font-syne { font-family: 'Syne', sans-serif; }
        
        /* Glassmorphism */
        .glass { background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-light { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* Animations */
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.5); } }
        .animate-float { animation: floatUp 2s ease-out forwards; position: absolute; pointer-events: none; font-size: 2rem; z-index: 50;}
        
        @keyframes bounceGift { 0% { transform: scale(0); } 50% { transform: scale(1.5); } 100% { transform: scale(0); } }
        .animate-gift { animation: bounceGift 3s ease-in-out forwards; position: fixed; top: 40%; left: 50%; margin-left: -75px; z-index: 100; filter: drop-shadow(0 0 20px #ffea00); }

        .hidden-audio { display: none; }
    </style>
</head>
<body class="min-h-screen relative">

    <!-- Global Alerts/Toasts -->
    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <!-- ================= AUTH SCREEN ================= -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-5 hidden">
        <div class="glass w-full max-w-md p-8 rounded-3xl text-center">
            <h1 class="font-syne text-4xl mb-2 text-white drop-shadow-lg">Join the Elite</h1>
            <p class="text-sm text-gray-200 mb-8">Setup your premium profile</p>
            
            <div class="relative w-32 h-32 mx-auto mb-6">
                <img id="auth-preview" src="https://via.placeholder.com/150/000000/FFFFFF/?text=Upload" class="w-full h-full object-cover rounded-full border-4 border-primary shadow-[0_0_15px_#ff758c]">
                <label class="absolute bottom-0 right-0 bg-white text-primary p-2 rounded-full cursor-pointer shadow-lg hover:scale-110 transition">
                    <span class="material-symbols-outlined text-sm">photo_camera</span>
                    <input type="file" id="auth-file" class="hidden" accept="image/*">
                </label>
            </div>
            
            <input type="text" id="auth-name" placeholder="Enter Display Name" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 mb-6 focus:outline-none focus:ring-2 focus:ring-primary placeholder-gray-300">
            
            <button id="auth-btn" class="w-full bg-gradient-to-r from-primary to-red-500 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(255,117,140,0.6)] hover:scale-105 transition">
                Enter App
            </button>
        </div>
    </div>

    <!-- ================= LOBBY SCREEN ================= -->
    <div id="lobby-screen" class="min-h-screen flex-col hidden pb-20">
        <!-- Header -->
        <div class="glass flex items-center justify-between p-4 sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <img id="lobby-user-img" src="" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-md">
                <div>
                    <h2 id="lobby-user-name" class="font-bold text-lg leading-tight text-white shadow-black drop-shadow-md">User Name</h2>
                    <div class="flex items-center text-xs text-yellow-300 font-bold drop-shadow">
                        <span class="material-symbols-outlined text-[16px] mr-1">diamond</span> <span id="lobby-diamonds">1000</span>
                    </div>
                </div>
            </div>
            <button class="material-symbols-outlined text-3xl hover:text-primary transition shadow-black drop-shadow-md">notifications</button>
        </div>

        <!-- Rooms List -->
        <div class="p-5 flex-1">
            <h2 class="font-syne text-2xl mb-4 drop-shadow-md text-white">Active Rooms</h2>
            <div id="room-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Rooms injected via JS -->
            </div>
        </div>

        <!-- Floating Create Button -->
        <button id="btn-create-room" class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-tr from-red-500 to-pink-500 rounded-full shadow-[0_0_20px_#ff7eb3] flex items-center justify-center text-white hover:scale-110 transition z-40">
            <span class="material-symbols-outlined text-4xl">add</span>
        </button>
    </div>

    <!-- ================= LIVE AUDIO ROOM SCREEN ================= -->
    <div id="room-screen" class="min-h-screen flex flex-col hidden bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat relative">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-0"></div> <!-- Overlay -->
        
        <!-- Room Header -->
        <div class="glass flex items-center justify-between p-4 z-10">
            <div class="flex items-center gap-2">
                <button id="btn-leave-room" class="material-symbols-outlined text-2xl bg-white/20 p-2 rounded-full hover:bg-white/40 transition">arrow_back</button>
                <h2 id="room-title" class="font-syne text-xl text-white ml-2 drop-shadow-md">Luxury Lounge</h2>
            </div>
            <button class="bg-red-500/80 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-lg hover:bg-red-600 transition" id="btn-power">
                <span class="material-symbols-outlined text-sm align-middle">power_settings_new</span> End
            </button>
        </div>

        <!-- YouTube Embed Container (Hidden by default) -->
        <div id="yt-container" class="z-10 w-full px-4 mt-4 hidden">
            <div class="aspect-video w-full rounded-xl overflow-hidden glass shadow-2xl border-2 border-white/20">
                <iframe id="yt-iframe" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <!-- 10-Seat Grid Engine -->
        <div class="flex-1 flex flex-col justify-center p-4 z-10">
            <div class="grid grid-cols-5 gap-x-2 gap-y-8 max-w-2xl mx-auto w-full" id="seat-grid">
                <!-- 10 Seats injected via JS -->
            </div>
        </div>

        <!-- Bottom Action Bar -->
        <div class="glass p-3 z-10 mt-auto rounded-t-3xl flex justify-around items-center">
            <button id="btn-chat" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition"><span class="material-symbols-outlined">chat</span></button>
            <button id="btn-react-heart" class="p-3 bg-white/10 rounded-full hover:bg-white/20 text-pink-400 transition"><span class="material-symbols-outlined">favorite</span></button>
            
            <!-- Main Mic Toggle -->
            <button id="btn-toggle-mic" class="p-5 bg-gradient-to-t from-green-400 to-green-600 rounded-full shadow-[0_0_15px_#4ade80] hover:scale-110 transition -translate-y-4 border-4 border-black/20">
                <span id="mic-icon" class="material-symbols-outlined text-3xl">mic</span>
            </button>

            <button id="btn-react-fire" class="p-3 bg-white/10 rounded-full hover:bg-white/20 text-orange-400 transition"><span class="material-symbols-outlined">local_fire_department</span></button>
            <button id="btn-gift" class="p-3 bg-white/10 rounded-full hover:bg-white/20 text-yellow-300 transition"><span class="material-symbols-outlined">featured_seasonal_and_gifts</span></button>
        </div>

        <!-- Animation Containers -->
        <div id="reaction-layer" class="absolute inset-0 pointer-events-none overflow-hidden z-20"></div>
        <img id="gift-popup" src="https://cdn-icons-png.flaticon.com/512/4213/4213665.png" class="w-36 h-36 hidden animate-gift">
    </div>

    <!-- Hidden Audio Elements for WebRTC -->
    <div id="remote-audios" class="hidden-audio"></div>

    <!-- ================= FIREBASE & APP LOGIC ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update, onDisconnect, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration (Provided in prompt)
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const IMGBB_API_KEY = "7ea229f30d98aebf6b1302b6d3576f9a";

        // Global State
        let currentUser = null;
        let currentRoomId = null;
        let mySeatIndex = null;
        let localStream = null;
        let peerConnections = {}; // WebRTC PCs

        // DOM Elements
        const screens = {
            auth: document.getElementById('auth-screen'),
            lobby: document.getElementById('lobby-screen'),
            room: document.getElementById('room-screen')
        };

        // Utility: Show Toast
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'glass-light px-4 py-2 rounded-xl text-white text-sm shadow-lg font-bold transition-all';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        // Switch Screens
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        // ================= AUTHENTICATION =================
        async function initAuth() {
            const storedUser = localStorage.getItem('premiumUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                loadLobby();
            } else {
                showScreen('auth');
            }
        }

        // Preview Image Selection
        let selectedFile = null;
        document.getElementById('auth-file').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('auth-preview').src = e.target.result;
                reader.readAsDataURL(selectedFile);
            }
        });

        // Submit Auth
        document.getElementById('auth-btn').addEventListener('click', async () => {
            const name = document.getElementById('auth-name').value.trim();
            if(!name) return showToast("Enter Display Name!");
            
            const btn = document.getElementById('auth-btn');
            btn.innerText = "Loading...";
            btn.disabled = true;

            let photoUrl = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"; // Default
            
            // Upload to ImgBB
            if (selectedFile) {
                const formData = new FormData();
                formData.append("image", selectedFile);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const json = await res.json();
                    if(json.success) photoUrl = json.data.url;
                } catch(e) {
                    showToast("Image upload failed, using default.");
                }
            }

            const uid = "user_" + Date.now() + Math.random().toString(36).substring(2);
            currentUser = { uid, name, photoUrl, diamonds: 500 };
            
            // Save to Firebase & LocalStorage
            await set(ref(db, `users/${uid}`), currentUser);
            localStorage.setItem('premiumUser', JSON.stringify(currentUser));
            
            btn.innerText = "Enter App";
            btn.disabled = false;
            loadLobby();
        });

        // ================= LOBBY LOGIC =================
        function loadLobby() {
            showScreen('lobby');
            document.getElementById('lobby-user-img').src = currentUser.photoUrl;
            document.getElementById('lobby-user-name').innerText = currentUser.name;
            document.getElementById('lobby-diamonds').innerText = currentUser.diamonds;

            // Fetch Rooms Realtime
            const roomsRef = ref(db, 'rooms');
            onValue(roomsRef, (snapshot) => {
                const roomList = document.getElementById('room-list');
                roomList.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.entries(data).forEach(([roomId, room]) => {
                        const count = room.seats ? Object.keys(room.seats).length : 0;
                        const card = document.createElement('div');
                        card.className = "glass p-4 rounded-2xl cursor-pointer hover:-translate-y-1 transition duration-300 relative overflow-hidden";
                        card.innerHTML = `
                            <div class="absolute -right-4 -top-4 w-16 h-16 bg-gradient-to-br from-primary to-transparent rounded-full opacity-50 blur-lg"></div>
                            <h3 class="font-syne text-xl text-white mb-1 shadow-black drop-shadow">${room.name}</h3>
                            <p class="text-xs text-gray-300 mb-3">Host: ${room.hostName}</p>
                            <div class="flex justify-between items-center">
                                <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold text-white"><span class="material-symbols-outlined text-[12px] align-middle">group</span> ${count}/10 Seated</span>
                                <button class="bg-primary px-4 py-1 rounded-full text-sm font-bold text-white shadow-[0_0_10px_#ff758c]">Join</button>
                            </div>
                        `;
                        card.onclick = () => joinRoom(roomId, room);
                        roomList.appendChild(card);
                    });
                } else {
                    roomList.innerHTML = `<p class="text-gray-300 text-center w-full col-span-2">No active rooms. Create one!</p>`;
                }
            });
        }

        // Create Room
        document.getElementById('btn-create-room').addEventListener('click', async () => {
            const roomName = prompt("Enter Room Name:");
            if(!roomName) return;
            const roomId = "room_" + Date.now();
            const newRoom = {
                id: roomId,
                name: roomName,
                hostId: currentUser.uid,
                hostName: currentUser.name,
                bg: 'default',
                seats: {} // 0-9 indices
            };
            await set(ref(db, `rooms/${roomId}`), newRoom);
            joinRoom(roomId, newRoom);
        });

        // ================= ROOM & SEATING LOGIC =================
        let roomDataListener = null;

        function renderSeats(roomData) {
            const grid = document.getElementById('seat-grid');
            grid.innerHTML = '';
            for(let i=0; i<10; i++) {
                const isOccupied = roomData.seats && roomData.seats[i];
                const seatDiv = document.createElement('div');
                seatDiv.className = "flex flex-col items-center justify-center gap-1 cursor-pointer relative";
                
                if(isOccupied) {
                    const user = roomData.seats[i];
                    const isMe = user.uid === currentUser.uid;
                    seatDiv.innerHTML = `
                        <div class="w-16 h-16 rounded-full p-1 ${isMe ? 'bg-gradient-to-r from-yellow-400 to-yellow-600' : 'bg-white/30'} shadow-lg relative">
                            <img src="${user.photoUrl}" class="w-full h-full rounded-full object-cover">
                            ${user.isMuted ? '<div class="absolute bottom-0 right-0 bg-gray-800 rounded-full w-5 h-5 flex items-center justify-center"><span class="material-symbols-outlined text-[12px] text-red-500">mic_off</span></div>' : ''}
                        </div>
                        <span class="text-xs text-white bg-black/50 px-2 py-0.5 rounded shadow w-full text-center truncate ${isMe ? 'text-yellow-300 font-bold' : ''}">${user.name}</span>
                    `;
                    seatDiv.onclick = () => handleSeatClick(i, user, roomData.hostId);
                } else {
                    seatDiv.innerHTML = `
                        <div class="w-16 h-16 rounded-full border-2 border-dashed border-white/40 flex items-center justify-center bg-black/10 hover:bg-white/10 transition">
                            <span class="material-symbols-outlined text-white/50 text-2xl">add</span>
                        </div>
                        <span class="text-xs text-transparent">Empty</span>
                    `;
                    seatDiv.onclick = () => takeSeat(i);
                }
                grid.appendChild(seatDiv);
            }
        }

        async function joinRoom(roomId, roomObj) {
            currentRoomId = roomId;
            mySeatIndex = null;
            showScreen('room');
            document.getElementById('room-title').innerText = roomObj.name;
            
            // Listen to Room Changes
            roomDataListener = onValue(ref(db, `rooms/${roomId}`), (snap) => {
                const data = snap.val();
                if(!data) return leaveRoom(); // Room deleted
                renderSeats(data);
                // Sync YouTube if host sets it
                if(data.ytLink) {
                    document.getElementById('yt-container').classList.remove('hidden');
                    document.getElementById('yt-iframe').src = data.ytLink;
                }
            });

            // Listen for Reactions
            onChildAdded(ref(db, `events/${roomId}`), (snap) => {
                const event = snap.val();
                if(event.type === 'gift') triggerGift();
                else triggerReaction(event.type); // 'fire' or 'heart'
            });

            // Set Disconnect Hook (Remove from seat if app closed)
            onDisconnect(ref(db, `rooms/${roomId}/seats`)).cancel();
        }

        async function takeSeat(index) {
            if(mySeatIndex !== null) return showToast("Already seated!");
            
            // WebRTC: Request Mic
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('mic-icon').innerText = 'mic';
                document.getElementById('btn-toggle-mic').classList.replace('from-red-500', 'from-green-400');
                document.getElementById('btn-toggle-mic').classList.replace('to-red-700', 'to-green-600');
            } catch(e) {
                return showToast("Microphone access required to sit!");
            }

            mySeatIndex = index;
            const seatData = { ...currentUser, isMuted: false };
            await set(ref(db, `rooms/${currentRoomId}/seats/${index}`), seatData);
            
            // Remove seat on disconnect
            onDisconnect(ref(db, `rooms/${currentRoomId}/seats/${index}`)).remove();

            // Init WebRTC mesh (simplified auto-connect conceptually)
            initWebRTCMesh();
        }

        function handleSeatClick(index, seatUser, hostId) {
            if(seatUser.uid === currentUser.uid) {
                // Self Mute Toggle
                toggleMic(index);
            } else if (currentUser.uid === hostId) {
                // Host Actions
                if(confirm(`Kick ${seatUser.name} from seat?`)) {
                    remove(ref(db, `rooms/${currentRoomId}/seats/${index}`));
                }
            } else {
                // 1-on-1 Call Intent
                if(confirm(`Request private call with ${seatUser.name}?`)) {
                    showToast("Call signaling sent (Simulated)");
                }
            }
        }

        async function toggleMic(index) {
            if(localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                audioTrack.enabled = !audioTrack.enabled;
                const isMuted = !audioTrack.enabled;
                
                // Update UI Button
                const btn = document.getElementById('btn-toggle-mic');
                const icon = document.getElementById('mic-icon');
                if(isMuted) {
                    icon.innerText = 'mic_off';
                    btn.classList.replace('from-green-400', 'from-red-500');
                    btn.classList.replace('to-green-600', 'to-red-700');
                } else {
                    icon.innerText = 'mic';
                    btn.classList.replace('from-red-500', 'from-green-400');
                    btn.classList.replace('to-red-700', 'to-green-600');
                }
                
                // Update Firebase
                await update(ref(db, `rooms/${currentRoomId}/seats/${index}`), { isMuted });
            }
        }

        // Leave Room Flow
        async function leaveRoom() {
            if(mySeatIndex !== null && currentRoomId) {
                await remove(ref(db, `rooms/${currentRoomId}/seats/${mySeatIndex}`));
            }
            if(localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            // Cleanup WebRTC connections
            Object.values(peerConnections).forEach(pc => pc.close());
            peerConnections = {};
            document.getElementById('remote-audios').innerHTML = '';

            currentRoomId = null;
            mySeatIndex = null;
            loadLobby();
        }
        document.getElementById('btn-leave-room').addEventListener('click', leaveRoom);
        document.getElementById('btn-power').addEventListener('click', leaveRoom);

        // ================= ANIMATIONS & BOTTOM BAR =================
        function sendEvent(type) {
            if(!currentRoomId) return;
            push(ref(db, `events/${currentRoomId}`), { type, sender: currentUser.uid, ts: Date.now() });
        }

        document.getElementById('btn-react-heart').addEventListener('click', () => sendEvent('heart'));
        document.getElementById('btn-react-fire').addEventListener('click', () => sendEvent('fire'));
        document.getElementById('btn-gift').addEventListener('click', () => {
            if(currentUser.diamonds < 100) return showToast("Not enough diamonds!");
            currentUser.diamonds -= 100;
            update(ref(db, `users/${currentUser.uid}`), { diamonds: currentUser.diamonds });
            sendEvent('gift');
            showToast("Gift Sent! -100 Diamonds");
        });
        document.getElementById('btn-toggle-mic').addEventListener('click', () => {
            if(mySeatIndex !== null) toggleMic(mySeatIndex);
            else showToast("Take a seat first!");
        });

        function triggerReaction(type) {
            const layer = document.getElementById('reaction-layer');
            const emoji = document.createElement('div');
            emoji.className = 'animate-float';
            emoji.innerText = type === 'heart' ? '💖' : '🔥';
            emoji.style.left = Math.random() * 80 + 10 + '%';
            emoji.style.bottom = '100px';
            layer.appendChild(emoji);
            setTimeout(() => emoji.remove(), 2000);
        }

        function triggerGift() {
            const popup = document.getElementById('gift-popup');
            popup.classList.remove('hidden');
            // Re-trigger animation
            popup.style.animation = 'none';
            popup.offsetHeight; 
            popup.style.animation = null;
            setTimeout(() => popup.classList.add('hidden'), 3000);
        }


        // ================= WebRTC MESH NETWORK (Scaffold) =================
        // In a true production app, we handle full ICE negotiation here. 
        // This is the functional structural scaffold ensuring no placeholders break the code.
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        
        function initWebRTCMesh() {
            const signalsRef = ref(db, `signals/${currentRoomId}/${currentUser.uid}`);
            onChildAdded(signalsRef, async (snap) => {
                const signal = snap.val();
                const senderId = signal.sender;
                
                if(!peerConnections[senderId]) {
                    createPeerConnection(senderId);
                }
                
                const pc = peerConnections[senderId];
                
                if(signal.type === 'offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    sendSignal(senderId, { type: 'answer', sdp: answer });
                } else if(signal.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                } else if(signal.type === 'ice') {
                    await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
                }
            });

            // Simulate broadcasting offer to existing seated users
            get(ref(db, `rooms/${currentRoomId}/seats`)).then(snap => {
                const seats = snap.val();
                if(seats) {
                    Object.values(seats).forEach(user => {
                        if(user.uid !== currentUser.uid) {
                            createPeerConnection(user.uid, true);
                        }
                    });
                }
            });
        }

        async function createPeerConnection(targetId, isInitiator = false) {
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[targetId] = pc;

            if(localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            pc.onicecandidate = (e) => {
                if(e.candidate) sendSignal(targetId, { type: 'ice', candidate: e.candidate });
            };

            pc.ontrack = (e) => {
                // Render invisible audio for remote peer to handle iOS/Chrome autoplay policies
                const container = document.getElementById('remote-audios');
                let audioEl = document.getElementById(`audio-${targetId}`);
                if(!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = `audio-${targetId}`;
                    audioEl.autoplay = true;
                    audioEl.playsInline = true;
                    container.appendChild(audioEl);
                }
                audioEl.srcObject = e.streams[0];
            };

            if(isInitiator) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendSignal(targetId, { type: 'offer', sdp: offer });
            }
        }

        function sendSignal(targetId, payload) {
            const refPath = ref(db, `signals/${currentRoomId}/${targetId}`);
            push(refPath, { ...payload, sender: currentUser.uid });
        }

        // Start App
        initAuth();
    </script>
</body>
</html>
