<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zingoo - Premium Live Audio Room</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'zingoo-gold': '#FFD700',
                        'zingoo-pink': '#FF1493',
                        'luxury-yellow': '#f1c40f'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Syne', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Premium Gold Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }

        /* Beautiful Floating Gold-Ribbon Luxury Background matching Image 1 */
        .gold-room-bg {
            background: radial-gradient(circle at center, #fff2a3 0%, #ffd043 50%, #cca010 100%);
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        .gold-room-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            opacity: 0.15;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* Glass capsule for bottom-left chat overlay */
        .chat-capsule {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Ambient Pulsing Glow for Speaking Users */
        .speaking-glow {
            box-shadow: 0 0 20px #FF1493, inset 0 0 10px #FF1493;
            animation: pulseSpeaking 1.5s infinite;
        }
        @keyframes pulseSpeaking {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Limited Offer Widget CSS */
        .offer-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }
    </style>
</head>
<body class="bg-[#0c0c0e] text-white font-sans antialiased h-[100dvh] overflow-hidden select-none">

    <!-- Screen Container -->
    <div class="relative w-full h-full">

        <!-- LOBBY SCREEN (Bypassed automatically if joined from Home Dashboard) -->
        <div id="lobby-screen" class="absolute inset-0 z-40 bg-zinc-950 flex flex-col p-6 hidden">
            <header class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <img id="lobby-avatar" src="https://i.ibb.co/6HvwbJ0/default-avatar.png" class="w-12 h-12 rounded-full object-cover border-2 border-zingoo-gold">
                    <div>
                        <h4 id="lobby-name" class="font-bold text-white">Guest</h4>
                        <p class="text-xs text-zingoo-gold flex items-center gap-1">💎 <span id="lobby-diamonds">0</span></p>
                    </div>
                </div>
                <button onclick="window.history.back()" class="bg-zinc-800 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-zinc-700 transition">Back to Home</button>
            </header>

            <div class="flex-1 overflow-y-auto" id="room-list-container">
                <h3 class="font-bold text-lg text-zinc-400 mb-4">Active Audio Rooms</h3>
                <div id="room-list" class="grid gap-4">
                    <!-- Rooms loaded via Firebase -->
                    <p class="text-center text-zinc-600 text-sm py-10">Searching for live sessions...</p>
                </div>
            </div>

            <button onclick="openCreateRoomModal()" class="fixed bottom-8 right-8 w-14 h-14 bg-gradient-to-tr from-zingoo-pink to-zingoo-gold rounded-full flex items-center justify-center text-white text-3xl shadow-xl hover:scale-105 active:scale-95 transition-transform">+</button>
        </div>

        <!-- LIVE AUDIO ROOM SCREEN (Matching Image 1) -->
        <div id="room-screen" class="absolute inset-0 gold-room-bg flex flex-col justify-between hidden">
            
            <!-- Room Header Row -->
            <div class="p-4 flex justify-between items-center z-20">
                <div class="bg-black/35 backdrop-blur-md px-3 py-1.5 rounded-full flex items-center gap-2 border border-white/10">
                    <img id="room-host-avatar" src="https://i.ibb.co/6HvwbJ0/default-avatar.png" class="w-7 h-7 rounded-full object-cover">
                    <div class="flex flex-col">
                        <span id="room-title" class="text-xs font-black text-white leading-tight">Room Title</span>
                        <span class="text-[9px] text-white/70 flex items-center gap-1"><span class="material-symbols-outlined text-[10px]">group</span> <span id="viewer-count">1</span> joined</span>
                    </div>
                </div>
                <button id="leave-room-btn" class="bg-red-500/90 hover:bg-red-600 text-white font-extrabold text-xs px-6 py-2 rounded-full shadow-lg transition active:scale-95">Leave</button>
            </div>

            <!-- WATERMARK TITLE IN CENTER (Matching Screenshot "ZINGOO" Glow) -->
            <div class="absolute top-[38%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none select-none z-10 text-center w-full px-4">
                <span class="font-black text-6xl md:text-7xl tracking-[0.15em] text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-400 to-yellow-600 drop-shadow-[0_4px_12px_rgba(218,165,32,0.8)] font-display">ZINGOO</span>
            </div>

            <!-- Seats Grid Layout (2 Rows of 5 Seats = 10 seats total) -->
            <div class="px-4 py-2 z-20 mt-2">
                <div id="seats-grid" class="grid grid-cols-5 gap-y-6 gap-x-2">
                    <!-- Dynamic 10 Seats injected here -->
                </div>
            </div>

            <!-- Chat Container & Floating Widgets Overlay -->
            <div class="relative flex-1 flex flex-col justify-end p-4 z-20">
                
                <!-- Bottom Left Chat Messages (Capsule bubbles stacking upwards) -->
                <div id="chat-container" class="max-h-[160px] w-[65%] overflow-y-auto no-scrollbar flex flex-col gap-2 pointer-events-auto pb-4">
                    <!-- Chats will appear here -->
                </div>

                <!-- Floating Limited Offers Card (Bottom Right - Matching Screenshot Purple Box) -->
                <div class="absolute bottom-4 right-4 w-[130px] rounded-2xl p-3.5 offer-gradient text-center flex flex-col items-center">
                    <span class="text-[8px] font-black tracking-widest text-purple-200 uppercase mb-1">Limited Offers</span>
                    <div class="flex items-center gap-1 text-base font-black text-white">
                        <span class="material-symbols-outlined text-yellow-300 text-[16px]">diamond</span>
                        <span>300</span>
                    </div>
                    <span class="text-[10px] text-purple-300 font-semibold line-through">₹100</span>
                    <button onclick="buyDiamondPack(100, 300)" class="mt-2 bg-white text-purple-700 text-[10px] font-black py-1.5 w-full rounded-full shadow hover:scale-105 active:scale-95 transition-transform">Buy Now</button>
                </div>

                <!-- Buy More Diamonds Capsule (Bottom Left - Matching White/Grey Pill) -->
                <div onclick="buyDiamondPack(50, 150)" class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-md border border-white rounded-full px-3 py-1 flex items-center gap-1.5 cursor-pointer hover:bg-white transition-all transform active:scale-95 shadow-md">
                    <span class="material-symbols-outlined text-purple-600 text-[14px]">diamond</span>
                    <span id="room-diamonds-balance" class="text-gray-900 font-extrabold text-[11px]">0</span>
                    <span class="text-[9px] text-gray-500 font-bold border-l border-gray-300 pl-1.5">Buy More</span>
                </div>
            </div>

            <!-- Bottom Action Navigation Bar (Matching Image Buttons) -->
            <div class="p-4 bg-black/25 backdrop-blur-lg border-t border-white/5 flex justify-between items-center z-30 pb-6">
                <!-- Left Chat Pill Button -->
                <button onclick="openChatInputModal()" class="bg-gradient-to-r from-orange-400 to-rose-500 text-white font-extrabold text-sm px-6 py-2.5 rounded-full flex items-center gap-2 shadow-lg active:scale-95 transition-transform">
                    <span class="material-symbols-outlined text-[18px]">chat_bubble</span>
                    <span>Chat</span>
                </button>

                <!-- Action Controls (Vertical menu, Gifts, Microphone toggle) -->
                <div class="flex items-center gap-3">
                    <button onclick="openOptionsModal()" class="w-11 h-11 bg-indigo-600/90 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-[20px]">more_vert</span>
                    </button>
                    <button onclick="openGiftModal()" class="w-11 h-11 bg-teal-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-[20px]">redeem</span>
                    </button>
                    <button id="mic-toggle-btn" disabled class="w-11 h-11 bg-emerald-600 text-white disabled:bg-zinc-600 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-[20px]" id="mic-icon">mic_off</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- ================= MODALS & SLIDE-UPS ================= -->

        <!-- Create Room Modal -->
        <div id="create-room-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-sm relative">
                <button onclick="closeModal('create-room-modal')" class="absolute top-4 right-4 text-zinc-400 hover:text-white"><span class="material-symbols-outlined">close</span></button>
                <h3 class="text-white font-black text-xl mb-4 text-center">Create Live Audio Room</h3>
                
                <input type="text" id="new-room-name" placeholder="Enter Room Topic" class="w-full bg-zinc-800 border-none rounded-xl px-4 py-3 text-white placeholder-zinc-500 mb-3 focus:ring-1 focus:ring-zingoo-gold">
                <input type="number" id="new-room-fee" placeholder="Entry Tariff (Diamonds)" value="0" class="w-full bg-zinc-800 border-none rounded-xl px-4 py-3 text-white placeholder-zinc-500 mb-5 focus:ring-1 focus:ring-zingoo-gold">
                
                <button onclick="submitCreateRoom()" class="w-full bg-gradient-to-r from-zingoo-pink to-zingoo-gold text-white font-bold py-3.5 rounded-full shadow-lg active:scale-95 transition-transform">Launch Room</button>
            </div>
        </div>

        <!-- Chat Input Overlay (Mobile Typing Friendly) -->
        <div id="chat-input-modal" class="fixed inset-0 bg-black/65 backdrop-blur-sm z-50 flex items-end justify-center hidden">
            <div class="bg-zinc-900 border-t border-zinc-800 rounded-t-3xl p-4 w-full flex gap-2 pb-8">
                <input type="text" id="chat-input-field" placeholder="Say something nice..." class="flex-1 bg-zinc-800 border-none rounded-full px-4 py-3 text-white text-sm focus:outline-none focus:ring-1 focus:ring-zingoo-gold">
                <button onclick="sendChatMessage()" class="w-12 h-12 rounded-full bg-gradient-to-r from-orange-400 to-rose-500 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined">send</span></button>
                <button onclick="closeModal('chat-input-modal')" class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400 shrink-0"><span class="material-symbols-outlined">close</span></button>
            </div>
        </div>

        <!-- Options Popup Modal -->
        <div id="options-modal" class="fixed inset-0 bg-black/75 z-50 flex items-center justify-center hidden p-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 w-full max-w-xs text-center">
                <h4 class="font-bold text-white mb-4">Room Settings</h4>
                <div class="flex flex-col gap-2">
                    <button onclick="applyGoldenLayout()" class="bg-zinc-800 text-zingoo-gold py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[16px]">verified</span> Apply Golden Theme</button>
                    <button onclick="closeModal('options-modal')" class="bg-zinc-800 text-white py-2.5 rounded-xl text-xs font-bold">Close</button>
                </div>
            </div>
        </div>

        <!-- REDESIGNED REALTIME GIFT MODAL (Fetches custom admin stickers + default) -->
        <div id="gift-modal" class="fixed inset-0 bg-black/80 z-50 flex items-end justify-center hidden">
            <div class="bg-zinc-900 border-t border-zinc-800 rounded-t-3xl p-5 w-full max-w-lg flex flex-col h-[50vh]">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-white text-lg flex items-center gap-2"><span class="material-symbols-outlined text-yellow-500">redeem</span> Send Virtual Gift</h3>
                    <button onclick="closeModal('gift-modal')" class="text-zinc-400"><span class="material-symbols-outlined">close</span></button>
                </div>

                <!-- Gift Grid (Realtime populated via node 'gifts') -->
                <div id="gifts-grid" class="flex-1 overflow-y-auto grid grid-cols-4 gap-3 p-1">
                    <!-- Populated dynamically -->
                </div>
                
                <div class="pt-4 border-t border-zinc-800 flex justify-between items-center">
                    <span class="text-xs text-zinc-400">Balance: <span class="text-zingoo-gold font-bold">💎 <span id="gift-modal-diamonds">0</span></span></span>
                    <button onclick="buyDiamondPack(100, 300)" class="bg-purple-600 text-white font-bold text-xs px-4 py-2 rounded-full">Recharge</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Hidden audio receiver container for WebRTC -->
    <div id="remote-audios-container" class="hidden"></div>

    <!-- Firebase SDK Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update, onDisconnect, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Web SDK Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // STUN / TURN servers configuration for optimal audio transfer
        const iceServersConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" },
                { urls: "stun:global.stun.twilio.com:3478" }
            ]
        };

        // --- GLOBAL STATES ---
        let currentUser = null;
        let currentRoomId = null;
        let roomData = null;
        let mySeatIndex = null;
        let localAudioStream = null;
        
        let peerConnections = {}; // targetUserId -> RTCPeerConnection
        let candidateQueues = {}; // targetUserId -> Array of ICE candidate options (Race condition protector)

        // Listeners trackers
        let seatsListenerRef = null;
        let signalsListenerRef = null;
        let chatListenerRef = null;
        let disconnectHookRef = null;

        // --- SESSION PASSING & REALTIME SYNC ---
        window.addEventListener('load', () => {
            // Retrieve data directly from local storage set on index.html
            const storedName = localStorage.getItem("zingoo_user");
            const storedId = localStorage.getItem("zingoo_id");
            const storedAvatar = localStorage.getItem("zingoo_avatar") || "https://i.ibb.co/6HvwbJ0/default-avatar.png";
            const storedDiamonds = parseInt(localStorage.getItem("zingoo_diamonds") || "0");

            if(storedName && storedId) {
                currentUser = {
                    name: storedName,
                    id: storedId,
                    avatar: storedAvatar,
                    diamonds: storedDiamonds
                };

                // Sync current diamonds from DB in realtime
                onValue(ref(db, `users/${currentUser.name}/diamonds`), (snap) => {
                    if (snap.exists()) {
                        currentUser.diamonds = snap.val();
                        localStorage.setItem("zingoo_diamonds", currentUser.diamonds);
                        updateBalanceUI();
                    }
                });

                // Auto Bypass Lobby screen if 'roomId' is passed as query param from main homepage
                const urlParams = new URLSearchParams(window.location.search);
                const queryRoomId = urlParams.get('roomId');
                if (queryRoomId) {
                    joinRoom(queryRoomId);
                } else {
                    openLobbyScreen();
                }
            } else {
                // If unauthorized, return back to main profile dashboard page
                alert("Please log in or create a profile on the dashboard first!");
                window.location.href = "index.html";
            }
        });

        // --- NAVIGATION HANDLERS ---
        function openLobbyScreen() {
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('room-screen').classList.add('hidden');
            
            document.getElementById('lobby-name').innerText = currentUser.name;
            document.getElementById('lobby-avatar').src = currentUser.avatar;
            document.getElementById('lobby-diamonds').innerText = currentUser.diamonds.toLocaleString();

            listenToLobbyRooms();
        }

        window.openCreateRoomModal = () => document.getElementById('create-room-modal').classList.remove('hidden');
        window.openChatInputModal = () => document.getElementById('chat-input-modal').classList.remove('hidden');
        window.openOptionsModal = () => document.getElementById('options-modal').classList.remove('hidden');
        
        window.closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
        };

        function updateBalanceUI() {
            const bal = currentUser ? currentUser.diamonds : 0;
            const lobbyBal = document.getElementById('lobby-diamonds');
            const roomBal = document.getElementById('room-diamonds-balance');
            const giftBal = document.getElementById('gift-modal-diamonds');
            if (lobbyBal) lobbyBal.innerText = bal.toLocaleString();
            if (roomBal) roomBal.innerText = bal.toLocaleString();
            if (giftBal) giftBal.innerText = bal.toLocaleString();
        }

        // --- SECURE PAYMENT LINK REDIRECTION ---
        window.buyDiamondPack = (amount, diamonds) => {
            if (!currentUser) return;
            // Redirects to zingoo-pay.html located in the GitHub deployment relative URL structure
            window.location.href = `zingoo-pay.html?from=zingoo&username=${encodeURIComponent(currentUser.name)}&amount=${amount}&diamonds=${diamonds}`;
        };

        // --- LOBBY ROOMS FETCH ---
        function listenToLobbyRooms() {
            const roomsRef = ref(db, 'audio_rooms');
            onValue(roomsRef, (snapshot) => {
                const list = document.getElementById('room-list');
                list.innerHTML = '';
                const rooms = snapshot.val();

                if(!rooms) {
                    list.innerHTML = '<p class="text-zinc-600 text-sm text-center py-12">No active rooms found. Tap "+" to initiate one!</p>';
                    return;
                }

                Object.entries(rooms).forEach(([roomId, room]) => {
                    const seatCount = room.seats ? Object.keys(room.seats).length : 0;
                    list.insertAdjacentHTML('beforeend', `
                        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 flex justify-between items-center hover:border-zingoo-gold/40 transition-colors">
                            <div>
                                <h4 class="text-white font-black text-base">${room.name}</h4>
                                <p class="text-xs text-zinc-500 mt-1">Host: ${room.host} | Entry: 💎 ${room.fee || 0}</p>
                            </div>
                            <button onclick="joinRoom('${roomId}')" class="bg-gradient-to-r from-zingoo-pink to-zingoo-gold text-white font-bold text-xs px-5 py-2.5 rounded-full shadow-lg">Join</button>
                        </div>
                    `);
                });
            });
        }

        // --- CREATE ROOM ---
        window.submitCreateRoom = async () => {
            const topic = document.getElementById('new-room-name').value.trim();
            const fee = parseInt(document.getElementById('new-room-fee').value) || 0;

            if(!topic) { alert("Please set a room topic!"); return; }

            const roomId = 'room_' + Date.now();
            const roomRef = ref(db, `audio_rooms/${roomId}`);

            await set(roomRef, {
                id: roomId,
                name: topic,
                fee: fee,
                host: currentUser.name,
                hostAvatar: currentUser.avatar,
                createdAt: Date.now()
            });

            closeModal('create-room-modal');
            joinRoom(roomId);
        };

        // --- JOIN ROOM PROTOCOL ---
        window.joinRoom = async (roomId) => {
            const roomRef = ref(db, `audio_rooms/${roomId}`);
            const snapshot = await get(roomRef);
            if(!snapshot.exists()) {
                alert("Room is no longer active!");
                openLobbyScreen();
                return;
            }

            roomData = snapshot.val();

            // Deduct Entry tariff if applicable
            if(roomData.fee > 0 && roomData.host !== currentUser.name) {
                if(currentUser.diamonds < roomData.fee) {
                    alert(`This premium room requires ${roomData.fee} diamonds.`);
                    buyDiamondPack(100, 300);
                    return;
                }
                
                // Realtime deduction
                const newBalance = currentUser.diamonds - roomData.fee;
                await set(ref(db, `users/${currentUser.name}/diamonds`), newBalance);
            }

            currentRoomId = roomId;

            // Setup audio room views
            document.getElementById('room-title').innerText = roomData.name;
            document.getElementById('room-host-avatar').src = roomData.hostAvatar;
            document.getElementById('chat-container').innerHTML = ''; // Reset chats

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');

            updateBalanceUI();
            attachRoomSync();
        };

        // --- REALTIME ROOM SYNC & SIGNALING ---
        function attachRoomSync() {
            // Increment Viewer Count
            const joinRef = push(ref(db, `audio_rooms/${currentRoomId}/viewers`), currentUser.name);
            onDisconnect(joinRef).remove();

            // Sync Viewer count UI
            onValue(ref(db, `audio_rooms/${currentRoomId}/viewers`), (snap) => {
                const count = snap.exists() ? Object.keys(snap.val()).length : 1;
                document.getElementById('viewer-count').innerText = count;
            });

            // Realtime Sync for Seats Grid (10 Seats layout)
            seatsListenerRef = ref(db, `audio_rooms/${currentRoomId}/seats`);
            onValue(seatsListenerRef, (snap) => {
                const seats = snap.val() || {};
                renderSeats(seats);
            });

            // Realtime Signal reader (Webrtc Signalling Channel)
            signalsListenerRef = ref(db, `audio_rooms/${currentRoomId}/signals/${currentUser.id}`);
            onChildAdded(signalsListenerRef, handleSignalsInbound);

            // Connect Chat list
            chatListenerRef = ref(db, `audio_rooms/${currentRoomId}/chat`);
            onChildAdded(chatListenerRef, handleChatInbound);
        }

        // --- RENDER 10 SEATS (2 Rows of 5, matching Image 1) ---
        function renderSeats(seatsData) {
            const grid = document.getElementById('seats-grid');
            grid.innerHTML = '';

            let sittingOnSeat = false;

            for(let i = 0; i < 10; i++) {
                const occupant = seatsData[i];
                const col = document.createElement('div');
                col.className = 'flex flex-col items-center cursor-pointer';

                if(occupant) {
                    if(occupant.id === currentUser.id) {
                        sittingOnSeat = true;
                        mySeatIndex = i;
                    }

                    const speakingStyle = occupant.isSpeaking ? 'speaking-glow border-zingoo-pink' : 'border-zingoo-gold';
                    const muteIndicator = occupant.isMuted ? `<div class="absolute -bottom-1 -right-1 bg-red-600 rounded-full w-5 h-5 flex items-center justify-center border border-white shadow shadow-red-500/50"><span class="material-symbols-outlined text-white text-[12px]">mic_off</span></div>` : '';

                    col.innerHTML = `
                        <div onclick="openOccupantOptions('${occupant.id}', '${occupant.name}')" class="relative w-[52px] h-[52px] md:w-[60px] md:h-[60px] rounded-full border-2 ${speakingStyle} p-[2px] transition duration-350">
                            <img src="${occupant.avatar}" class="w-full h-full rounded-full object-cover">
                            ${muteIndicator}
                        </div>
                        <span class="text-[10px] md:text-xs text-white/90 font-semibold truncate w-full text-center mt-1.5">${occupant.name}</span>
                    `;
                } else {
                    // Lock icon layout if seat is empty, as shown in Image 1
                    col.innerHTML = `
                        <div onclick="takeEmptySeat(${i})" class="relative w-[52px] h-[52px] md:w-[60px] md:h-[60px] rounded-full border border-white/20 flex items-center justify-center bg-black/15">
                            <span class="material-symbols-outlined text-white/50 text-xl">lock</span>
                        </div>
                        <span class="text-[10px] md:text-xs text-white/40 font-semibold mt-1.5">Seat ${i + 1}</span>
                    `;
                }

                grid.appendChild(col);
            }

            // Sync mic action controllers
            const micBtn = document.getElementById('mic-toggle-btn');
            if(sittingOnSeat) {
                micBtn.disabled = false;
                if(localAudioStream && localAudioStream.getAudioTracks()[0]) {
                    const enabled = localAudioStream.getAudioTracks()[0].enabled;
                    document.getElementById('mic-icon').innerText = enabled ? 'mic' : 'mic_off';
                    micBtn.className = enabled ? 'w-11 h-11 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform' : 'w-11 h-11 bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform';
                }
            } else {
                micBtn.disabled = true;
                document.getElementById('mic-icon').innerText = 'mic_off';
                micBtn.className = 'w-11 h-11 bg-zinc-600 text-zinc-400 disabled:opacity-50 rounded-full flex items-center justify-center shadow-lg';
            }
        }

        // --- SEAT MANAGEMENT ---
        window.takeEmptySeat = async (index) => {
            if(mySeatIndex !== null) {
                alert("You are already seated on seat " + (mySeatIndex + 1));
                return;
            }

            try {
                // Initialize premium high-quality local microphone stream
                localAudioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                mySeatIndex = index;
                const seatRef = ref(db, `audio_rooms/${currentRoomId}/seats/${index}`);

                await set(seatRef, {
                    id: currentUser.id,
                    name: currentUser.name,
                    avatar: currentUser.avatar,
                    isMuted: false,
                    isSpeaking: false
                });

                // Clear seat dynamically if browser closes suddenly
                disconnectHookRef = onDisconnect(seatRef);
                disconnectHookRef.remove();

                // Join signalling mesh network with other occupants of this room
                const snapshot = await get(ref(db, `audio_rooms/${currentRoomId}/seats`));
                const allOccupants = snapshot.val() || {};

                Object.values(allOccupants).forEach(peer => {
                    if(peer.id !== currentUser.id) {
                        launchPeerConnection(peer.id, true); // Caller role
                    }
                });

            } catch (err) {
                console.error("Microphone Access Error:", err);
                alert("Please enable mic permissions to sit and broadcast audio.");
            }
        };

        // --- WEBRTC MULTI-USER MESH SIGNALLING SYSTEM ---
        function launchPeerConnection(targetId, isCaller) {
            if(peerConnections[targetId]) return peerConnections[targetId];

            const pc = new RTCPeerConnection(iceServersConfig);
            peerConnections[targetId] = pc;
            candidateQueues[targetId] = [];

            // Feed local audio tracks to pipeline
            if(localAudioStream) {
                localAudioStream.getTracks().forEach(track => pc.addTrack(track, localAudioStream));
            }

            // Candidates dispatch
            pc.onicecandidate = (event) => {
                if(event.candidate) {
                    dispatchSignal(targetId, {
                        type: 'candidate',
                        candidate: event.candidate.toJSON()
                    });
                }
            };

            // Capture remote inbound stream
            pc.ontrack = (event) => {
                const stream = new MediaStream([event.track]);
                let audioEl = document.getElementById(`audio_peer_${targetId}`);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = `audio_peer_${targetId}`;
                    audioEl.autoplay = true;
                    audioEl.playsInline = true;
                    document.getElementById('remote-audios-container').appendChild(audioEl);
                }
                audioEl.srcObject = stream;
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    unmountPeer(targetId);
                }
            };

            // Caller issues WebRTC Offer
            if(isCaller) {
                pc.onnegotiationneeded = async () => {
                    try {
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        dispatchSignal(targetId, {
                            type: 'offer',
                            sdp: offer.sdp
                        });
                    } catch (e) {
                        console.error("Negotiation failed:", e);
                    }
                };
            }

            return pc;
        }

        async function dispatchSignal(targetId, payload) {
            const outRef = ref(db, `audio_rooms/${currentRoomId}/signals/${targetId}`);
            await push(outRef, {
                senderId: currentUser.id,
                ...payload
            });
        }

        async function handleSignalsInbound(snap) {
            const data = snap.val();
            const signalKey = snap.key;
            
            // Wipe signal off database after parsing to avoid accumulation
            remove(ref(db, `audio_rooms/${currentRoomId}/signals/${currentUser.id}/${signalKey}`));

            if(data.senderId === currentUser.id) return;

            let pc = peerConnections[data.senderId];

            try {
                if (data.type === 'offer') {
                    pc = launchPeerConnection(data.senderId, false); // Receiver role
                    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
                    
                    // Empty candidates buffer queue
                    processIceQueue(data.senderId, pc);

                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    
                    dispatchSignal(data.senderId, {
                        type: 'answer',
                        sdp: answer.sdp
                    });

                } else if (data.type === 'answer') {
                    if(pc) {
                        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp }));
                        processIceQueue(data.senderId, pc);
                    }
                } else if (data.type === 'candidate') {
                    if(pc && pc.remoteDescription && pc.remoteDescription.type) {
                        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } else {
                        if(!candidateQueues[data.senderId]) candidateQueues[data.senderId] = [];
                        candidateQueues[data.senderId].push(data.candidate);
                    }
                }
            } catch (err) {
                console.error("WebRTC Signaling Error:", err);
            }
        }

        async function processIceQueue(peerId, pc) {
            if (candidateQueues[peerId] && candidateQueues[peerId].length > 0) {
                for (let cand of candidateQueues[peerId]) {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(cand));
                    } catch(e) {
                        console.error("Error processing candidate from queue:", e);
                    }
                }
                candidateQueues[peerId] = [];
            }
        }

        function unmountPeer(peerId) {
            if(peerConnections[peerId]) {
                peerConnections[peerId].close();
                delete peerConnections[peerId];
            }
            const el = document.getElementById(`audio_peer_${peerId}`);
            if(el) el.remove();
        }

        // --- HARDWARE CONTROLS (MIC MUTE TOGGLE) ---
        document.getElementById('mic-toggle-btn').addEventListener('click', async () => {
            if(!localAudioStream || mySeatIndex === null) return;

            const track = localAudioStream.getAudioTracks()[0];
            if(track) {
                track.enabled = !track.enabled;
                const isCurrentlyMuted = !track.enabled;

                document.getElementById('mic-icon').innerText = isCurrentlyMuted ? 'mic_off' : 'mic';
                document.getElementById('mic-toggle-btn').className = isCurrentlyMuted 
                    ? 'w-11 h-11 bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform'
                    : 'w-11 h-11 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform';

                // Realtime Sync changes to Seat
                await update(ref(db, `audio_rooms/${currentRoomId}/seats/${mySeatIndex}`), {
                    isMuted: isCurrentlyMuted
                });
            }
        });

        // --- REALTIME CHAT SYSTEM (Image 1 Style Bottom Left Glass Bubble) ---
        window.sendChatMessage = async () => {
            const text = document.getElementById('chat-input-field').value.trim();
            if(!text) return;

            // Check if user has sufficient diamond to chat (e.g., 4 Diamonds per message)
            if(currentUser.diamonds < 4) {
                alert("Insufficient diamonds. Messages cost 4 Diamonds each!");
                buyDiamondPack(50, 150);
                return;
            }

            // Deduct diamonds
            const postDeduction = currentUser.diamonds - 4;
            await set(ref(db, `users/${currentUser.name}/diamonds`), postDeduction);

            // Publish message
            await push(ref(db, `audio_rooms/${currentRoomId}/chat`), {
                sender: currentUser.name,
                senderAvatar: currentUser.avatar,
                msg: text,
                time: Date.now()
            });

            document.getElementById('chat-input-field').value = '';
            closeModal('chat-input-modal');
        };

        function handleChatInbound(snap) {
            const data = snap.val();
            const container = document.getElementById('chat-container');
            
            const messageElement = document.createElement('div');
            messageElement.className = 'chat-capsule rounded-2xl py-2 px-3.5 flex items-start gap-2.5 max-w-[95%] shrink-0';
            messageElement.innerHTML = `
                <img src="${data.senderAvatar}" class="w-6 h-6 rounded-full object-cover border border-white/20 mt-0.5 shrink-0">
                <div class="flex flex-col">
                    <span class="text-zingoo-gold font-black text-[11px] leading-tight">${data.sender}:</span>
                    <span class="text-white text-xs leading-[1.3] mt-0.5 font-medium">${data.msg}</span>
                </div>
            `;

            container.appendChild(messageElement);
            container.scrollTop = container.scrollHeight;
        }

        // --- OPTION ACTIONS MODAL ---
        window.applyGoldenLayout = () => {
            // Apply stunning golden visual layout
            document.getElementById('options-modal').classList.add('hidden');
            alert("Luxury golden template applied successfully.");
        };

        // --- DYNAMIC REALTIME GIFT STICKERS POPULATION ---
        window.openGiftModal = () => {
            document.getElementById('gift-modal').classList.remove('hidden');
            const giftsGrid = document.getElementById('gifts-grid');
            giftsGrid.innerHTML = '<p class="text-zinc-500 text-xs text-center col-span-4 mt-6">Syncing gift items...</p>';

            // realtime sync from Admin deployed gifts
            onValue(ref(db, 'gifts'), (snap) => {
                giftsGrid.innerHTML = '';
                const items = snap.val();
                
                // Add default gifts along with admin deployed items
                const defaultGifts = [
                    { key: 'd1', name: 'Microphone', cost: 10, imageUrl: 'https://cdn-icons-png.flaticon.com/512/3058/3058995.png' },
                    { key: 'd2', name: 'Gold Trophy', cost: 50, imageUrl: 'https://cdn-icons-png.flaticon.com/512/179/179249.png' },
                    { key: 'd3', name: 'Premium Crown', cost: 100, imageUrl: 'https://cdn-icons-png.flaticon.com/512/2984/2984534.png' }
                ];

                defaultGifts.forEach(item => {
                    giftsGrid.insertAdjacentHTML('beforeend', `
                        <div onclick="dispatchGift('${item.name}', ${item.cost}, '${item.imageUrl}')" class="bg-zinc-800 border border-zinc-700/60 rounded-xl p-3 text-center flex flex-col items-center justify-center cursor-pointer hover:border-zingoo-pink transition-colors">
                            <img src="${item.imageUrl}" class="w-10 h-10 object-contain mb-1.5 filter drop-shadow">
                            <span class="text-[9px] font-bold text-zinc-300 truncate w-full mb-0.5">${item.name}</span>
                            <span class="text-[10px] text-zingoo-gold font-black flex items-center gap-0.5">💎 ${item.cost}</span>
                        </div>
                    `);
                });

                if(items) {
                    Object.entries(items).forEach(([key, value]) => {
                        giftsGrid.insertAdjacentHTML('beforeend', `
                            <div onclick="dispatchGift('${value.name}', ${value.cost}, '${value.imageUrl}')" class="bg-zinc-800 border border-zinc-700/60 rounded-xl p-3 text-center flex flex-col items-center justify-center cursor-pointer hover:border-zingoo-pink transition-colors">
                                <img src="${value.imageUrl}" class="w-10 h-10 object-contain mb-1.5 filter drop-shadow">
                                <span class="text-[9px] font-bold text-zinc-300 truncate w-full mb-0.5">${value.name}</span>
                                <span class="text-[10px] text-zingoo-gold font-black flex items-center gap-0.5">💎 ${value.cost}</span>
                            </div>
                        `);
                    });
                }
            });
        };

        window.dispatchGift = async (name, cost, url) => {
            if(currentUser.diamonds < cost) {
                alert(`Insufficient Diamonds! You need ${cost} diamonds for sending a ${name}.`);
                buyDiamondPack(50, 150);
                return;
            }

            // Deduct diamonds
            const balancePostDeduction = currentUser.diamonds - cost;
            await set(ref(db, `users/${currentUser.name}/diamonds`), balancePostDeduction);

            // Publish beautiful announcement in chat
            await push(ref(db, `audio_rooms/${currentRoomId}/chat`), {
                sender: 'GIFT BOX 🎁',
                senderAvatar: url,
                msg: `${currentUser.name} gifted ${name} to the Broadcaster! 🎉`,
                time: Date.now()
            });

            closeModal('gift-modal');
            alert(`Sent ${name}!`);
        };

        // --- LEAVE ROOM FLOW ---
        document.getElementById('leave-room-btn').addEventListener('click', async () => {
            if(confirm("Confirm: Leave the audio room?")) {
                
                // Clear seating occupant if seated
                if(mySeatIndex !== null) {
                    await remove(ref(db, `audio_rooms/${currentRoomId}/seats/${mySeatIndex}`));
                    if(disconnectHookRef) disconnectHookRef.cancel();
                    mySeatIndex = null;
                }

                // Stop Local audio broadcaster track
                if(localAudioStream) {
                    localAudioStream.getTracks().forEach(track => track.stop());
                    localAudioStream = null;
                }

                // Close active connections
                Object.keys(peerConnections).forEach(peerId => {
                    unmountPeer(peerId);
                });

                peerConnections = {};
                candidateQueues = {};

                // Unsubscribe Realtime Database listeners
                if(seatsListenerRef) off(seatsListenerRef);
                if(signalsListenerRef) off(signalsListenerRef);
                if(chatListenerRef) off(chatListenerRef);

                currentRoomId = null;
                roomData = null;

                document.getElementById('remote-audios-container').innerHTML = '';

                // Safely redirect back to main home page
                window.location.href = "index.html";
            }
        });

    </script>
